<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="description" content="FXL Operacional simples: dashboard, contas, vendas, clientes, serviços, profissionais, importação e exportação.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#18181b">
<meta name="color-scheme" content="light">
<title>FXL Operacional — Simples</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   FXL OPERACIONAL SIMPLES
   Design preservado: tokens, fontes, sidebar escura, cards claros e linguagem visual.
   ========================================================================== */

:root{
  --ink:#1d211d;
  --ink-2:#3a423a;
  --paper:#f4f1e9;
  --surface:#fbf9f3;
  --line:#e2ddcf;
  --teal:#14776b;
  --teal-d:#0d5249;
  --teal-l:#e4f0ec;
  --amber:#b5710f;
  --amber-l:#f7eccf;
  --red:#a8332b;
  --red-l:#f6e1de;
  --green:#3f6d11;
  --green-l:#e8f0d9;
  --r-sm:8px;
  --r:10px;
  --shadow:0 1px 2px rgba(29,33,29,.06),0 6px 20px rgba(29,33,29,.05);
  --sidebar-w:236px;
  --sidebar-collapsed:74px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;overflow-x:hidden}
body{
  font-family:'Archivo',sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:14px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.45}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;letter-spacing:-.01em;line-height:1.15}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

.app{
  display:grid;
  grid-template-columns:var(--sidebar-w) minmax(0,1fr);
  min-height:100vh;
  transition:grid-template-columns .18s ease;
}
.app.is-collapsed{grid-template-columns:var(--sidebar-collapsed) minmax(0,1fr)}
.side{
  background:var(--ink);
  color:#cbd0c8;
  padding:18px 14px;
  position:sticky;
  top:0;
  height:100vh;
  overflow:auto;
  z-index:40;
}
.side-top{display:flex;align-items:flex-start;gap:8px}
.brand{
  font-family:'Fraunces',serif;
  font-size:21px;
  color:#fff;
  font-weight:600;
  padding:0 8px 4px;
  letter-spacing:-.02em;
  min-width:0;
  flex:1;
}
.brand small{
  display:block;
  font-family:'Archivo',sans-serif;
  font-size:10px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#7d877c;
  font-weight:500;
  margin-top:2px;
}
.collapse-btn{
  width:34px;
  height:34px;
  border-radius:var(--r-sm);
  border:1px solid #3a423a;
  background:#2a302a;
  color:#cbd0c8;
  display:grid;
  place-items:center;
}
.collapse-btn:hover{background:#313731;color:#fff}
.navgrp{margin-top:20px}
.navgrp>span{
  font-size:10px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#6c766b;
  padding:0 8px;
  display:block;
  margin-bottom:6px;
}
.nav{
  display:flex;
  width:100%;
  align-items:center;
  gap:10px;
  text-align:left;
  background:none;
  border:0;
  color:#cbd0c8;
  padding:8px 10px;
  border-radius:var(--r-sm);
  font-size:13.5px;
  margin-bottom:1px;
  transition:.12s;
  white-space:nowrap;
}
.nav:hover{background:#2a302a;color:#fff}
.nav.active{background:var(--teal);color:#fff;font-weight:500}
.nav .ico{width:20px;min-width:20px;text-align:center}
.app.is-collapsed .side{padding-inline:10px}
.app.is-collapsed .brand small,
.app.is-collapsed .navgrp>span,
.app.is-collapsed .nav .txt{display:none}
.app.is-collapsed .brand{font-size:18px;text-align:center;padding-inline:0}
.app.is-collapsed .nav{justify-content:center;padding-inline:8px}
.app.is-collapsed .side-top{flex-direction:column;align-items:center}
.app.is-collapsed .collapse-btn{transform:rotate(180deg)}

.reset{
  margin-top:24px;
  width:100%;
  font-size:11px;
  padding:7px;
  border-radius:var(--r-sm);
  background:#2a302a;
  color:#cbd0c8;
  border:1px solid #3a423a;
}
.reset:hover{background:#313731;color:#fff}

.main{
  padding:30px 38px;
  width:100%;
  min-width:0;
  max-width:1440px;
}
.topline{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-bottom:20px;
  border-bottom:1px solid var(--line);
  padding-bottom:16px;
  gap:16px;
}
.topline h1{font-size:28px}
.topline p{color:var(--ink-2);font-size:13px;margin-top:3px}
.user{font-size:12px;color:var(--ink-2);text-align:right}
.user b{color:var(--ink);font-weight:600;display:block}

.page-shell{min-width:0}
.page-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  margin-bottom:14px;
}
.page-title h2{font-size:22px}
.page-title p{color:var(--ink-2);font-size:13px;margin-top:3px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}

.grid{display:grid;gap:16px;min-width:0}
.metrics{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:22px}
.metric{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:16px 18px;
  box-shadow:var(--shadow);
  min-width:0;
}
.metric .lab{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
.metric .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;margin-top:6px;overflow-wrap:anywhere}
.metric .sub{font-size:12px;color:var(--ink-2);margin-top:2px}

.panel{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
  min-width:0;
}
.panel h3{font-family:'Archivo',sans-serif;font-size:14px;font-weight:600;margin-bottom:10px}
.panel-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}
.panel-head h3{margin:0}

.toolbar{
  display:flex;
  gap:8px;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  flex-wrap:wrap;
}
.tool-left,.tool-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:5px}
.fld input,.fld select,.fld textarea{
  width:100%;
  padding:9px 11px;
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  font-size:13.5px;
  background:#fff;
  color:var(--ink);
  min-width:0;
}
.fld textarea{min-height:92px;resize:vertical}
.fld input:focus,.fld select:focus,.fld textarea:focus{
  outline:2px solid var(--teal-l);
  border-color:var(--teal);
}
.inline-input{
  padding:9px 11px;
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  font-size:13.5px;
  background:#fff;
  color:var(--ink);
  min-width:180px;
}
.inline-input:focus{outline:2px solid var(--teal-l);border-color:var(--teal)}
.row2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}
.row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:13px;
  font-weight:500;
  padding:9px 16px;
  border-radius:var(--r-sm);
  border:1px solid var(--ink);
  background:var(--ink);
  color:#fff;
  transition:.12s;
  text-decoration:none;
}
.btn:hover{opacity:.9}
.btn.ghost{background:none;color:var(--ink)}
.btn.teal{background:var(--teal);border-color:var(--teal)}
.btn.red{background:var(--red);border-color:var(--red)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.icon{width:36px;padding:9px}

.table-scroll{overflow-x:auto;min-width:0}
table{
  width:100%;
  border-collapse:collapse;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--shadow);
  min-width:760px;
}
th{
  text-align:left;
  font-size:11px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--ink-2);
  font-weight:600;
  padding:11px 14px;
  border-bottom:1px solid var(--line);
  background:#f0ece0;
  white-space:nowrap;
}
td{
  padding:10px 14px;
  border-bottom:1px solid var(--line);
  font-size:13px;
  vertical-align:middle;
}
tr:last-child td{border-bottom:0}
td.num,th.num{text-align:right;font-family:'JetBrains Mono',monospace}
.actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
.bdg{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}
.b-prev{background:var(--amber-l);color:var(--amber)}
.b-ok{background:var(--green-l);color:var(--green)}
.b-bad{background:var(--red-l);color:var(--red)}
.b-neu{background:#e8e4d7;color:var(--ink-2)}

.split{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;align-items:start}
.list{
  display:grid;
  gap:8px;
}
.item{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  padding:10px 12px;
  min-width:0;
}
.item strong{display:block}
.item small{display:block;color:var(--ink-2);margin-top:2px}
.chart-bars{display:grid;gap:8px;margin-top:12px}
.bar-row{display:grid;grid-template-columns:116px minmax(0,1fr) 88px;gap:10px;align-items:center;font-size:12px;color:var(--ink-2)}
.bar-track{height:10px;background:#ece7da;border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:var(--teal);border-radius:999px;min-width:2px}

.filter-wrap{position:relative}
.filter-pop{
  position:absolute;
  top:calc(100% + 8px);
  right:0;
  width:min(520px,calc(100vw - 40px));
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--r);
  box-shadow:0 12px 60px rgba(0,0,0,.18);
  z-index:35;
  padding:14px;
  display:none;
}
.filter-pop.on{display:block}
.filter-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}

.scrim{
  position:fixed;
  inset:0;
  background:rgba(20,24,20,.55);
  display:none;
  z-index:50;
}
.scrim.on{display:block}
.modal{
  position:fixed;
  inset:5vh max(16px,calc((100vw - 860px)/2));
  background:var(--paper);
  z-index:51;
  display:none;
  flex-direction:column;
  border-radius:var(--r);
  box-shadow:0 12px 60px rgba(0,0,0,.25);
  overflow:hidden;
}
.modal.on{display:flex}
.mhead{
  padding:18px 28px;
  border-bottom:1px solid var(--line);
  background:var(--surface);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.mhead h2{font-size:20px}
.mhead .x{background:none;border:0;font-size:24px;color:var(--ink-2);line-height:1}
.mbody{padding:22px 28px;overflow:auto;min-height:0}
.mfoot{
  padding:14px 28px;
  border-top:1px solid var(--line);
  background:var(--surface);
  display:flex;
  justify-content:flex-end;
  gap:8px;
  flex-wrap:wrap;
}
.empty{
  border:1px dashed var(--line);
  color:var(--ink-2);
  background:#fff;
  border-radius:var(--r);
  padding:24px;
  text-align:center;
}
.note{
  background:var(--teal-l);
  color:var(--teal-d);
  border-left:4px solid var(--teal);
  padding:10px 12px;
  border-radius:var(--r-sm);
  margin-bottom:12px;
  font-size:13px;
}
.toast{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:80;
  display:grid;
  gap:8px;
}
.toast div{
  background:var(--ink);
  color:#fff;
  border-radius:var(--r-sm);
  padding:10px 12px;
  box-shadow:0 10px 28px rgba(0,0,0,.22);
  font-size:13px;
  max-width:min(380px,calc(100vw - 36px));
}

.file-drop{
  background:#fff;
  border:1px dashed var(--line);
  border-radius:var(--r);
  padding:16px;
}
.file-drop input{width:100%}
.audit-log{
  max-height:330px;
  overflow:auto;
  border:1px solid var(--line);
  border-radius:var(--r);
  background:#fff;
}
.audit-log .row{
  padding:9px 12px;
  border-bottom:1px solid var(--line);
  font-size:12px;
}
.audit-log .row:last-child{border-bottom:0}

:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

@media(max-width:1180px){
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
  .split{grid-template-columns:1fr}
}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .app.is-collapsed{grid-template-columns:1fr}
  .side{
    position:relative;
    height:auto;
    display:block;
  }
  .app.is-collapsed .brand small,
  .app.is-collapsed .navgrp>span,
  .app.is-collapsed .nav .txt{display:inline}
  .app.is-collapsed .brand{text-align:left}
  .app.is-collapsed .nav{justify-content:flex-start}
  .app.is-collapsed .side-top{flex-direction:row;align-items:flex-start}
  .app.is-collapsed .collapse-btn{transform:none}
  .main{padding:22px}
  .topline{align-items:flex-start;flex-direction:column}
  .user{text-align:left}
}
@media(max-width:760px){
  .metrics,.row2,.row3,.filter-grid{grid-template-columns:1fr}
  .page-header{flex-direction:column}
  .page-actions,.tool-left,.tool-right,.toolbar,.mfoot{width:100%;align-items:stretch}
  .btn,.inline-input{width:100%}
  .modal{
    inset:0;
    border-radius:0;
  }
  .mhead,.mbody,.mfoot{padding-inline:18px}
  .bar-row{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{transition:none!important;animation:none!important}
}

/* ==========================================================================
   PATCH MOBILE + SUPA READY — preserva identidade visual e simplifica operação.
   ========================================================================== */

.mobile-menu-btn{
  display:none;
  width:40px;
  height:40px;
  border-radius:var(--r-sm);
  border:1px solid var(--line);
  background:var(--surface);
  color:var(--ink);
  align-items:center;
  justify-content:center;
  font-size:20px;
  line-height:1;
  box-shadow:var(--shadow);
}
.top-copy{min-width:0}

/* ==========================================================================
   Kanban comercial — preserva tokens visuais existentes.
   ========================================================================== */
.kanban-shell{
  min-width:0;
}
.kanban-board{
  display:grid;
  grid-template-columns:repeat(6,minmax(245px,1fr));
  gap:12px;
  align-items:start;
  min-width:0;
  overflow-x:auto;
  padding-bottom:8px;
  -webkit-overflow-scrolling:touch;
}
.kanban-col{
  background:rgba(255,255,255,.42);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:10px;
  min-height:420px;
  min-width:0;
}
.kanban-col.is-over{
  outline:2px dashed var(--teal);
  outline-offset:-2px;
  background:var(--teal-l);
}
.kanban-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}
.kanban-title{
  display:flex;
  align-items:center;
  gap:7px;
  min-width:0;
  color:var(--ink);
  font-size:12px;
  font-weight:700;
}
.kanban-dot{
  width:9px;
  height:9px;
  border-radius:999px;
  background:var(--teal);
  flex:0 0 auto;
}
.kanban-count{
  background:var(--ink);
  color:#fff;
  border-radius:999px;
  font-size:10.5px;
  line-height:1;
  padding:4px 7px;
  font-family:'JetBrains Mono',monospace;
}
.kanban-sum{
  font-family:'JetBrains Mono',monospace;
  color:var(--ink-2);
  font-size:11px;
  margin:-3px 0 10px 16px;
}
.opp-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  padding:10px;
  margin-bottom:8px;
  box-shadow:0 1px 1px rgba(0,0,0,.03);
  cursor:grab;
  min-width:0;
}
.opp-card:active{cursor:grabbing}
.opp-card.is-dragging{opacity:.55}
.opp-name{
  font-weight:700;
  font-size:13px;
  color:var(--ink);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.opp-company,
.opp-service{
  color:var(--ink-2);
  font-size:12px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.opp-service{margin-top:3px}
.opp-value{
  margin-top:6px;
  font-family:'JetBrains Mono',monospace;
  color:var(--teal-d);
  font-weight:600;
  font-size:13px;
}
.opp-meta{
  margin-top:7px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  color:var(--ink-2);
  font-size:11px;
}
.opp-actions{
  margin-top:8px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.opp-empty{
  border:1px dashed var(--line);
  border-radius:var(--r-sm);
  padding:20px 10px;
  color:var(--ink-2);
  background:rgba(255,255,255,.45);
  text-align:center;
  font-size:12px;
}
.kanban-tabs{
  display:flex;
  gap:8px;
  background:rgba(255,255,255,.38);
  padding:6px;
  border-radius:var(--r-sm);
  margin-bottom:16px;
  border:1px solid var(--line);
}
.kanban-tab{
  flex:1;
  border:0;
  background:transparent;
  color:var(--ink-2);
  padding:8px 10px;
  border-radius:var(--r-sm);
  font-weight:600;
}
.kanban-tab.active{
  background:#fff;
  color:var(--ink);
  box-shadow:var(--shadow);
}
.tab-panel[hidden]{display:none!important}
@media(max-width:1180px){
  .kanban-board{
    grid-template-columns:repeat(6,minmax(245px,78vw));
  }
}
@media(max-width:760px){
  .kanban-board{
    grid-template-columns:repeat(6,minmax(250px,86vw));
  }
  .kanban-col{min-height:360px}
  .opp-actions .btn{width:auto;min-height:34px}
}

.sync-status{
  margin-top:10px;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  background:#fff;
  color:var(--ink-2);
  font-size:12px;
}
.sync-status.ok{background:var(--green-l);color:var(--green);border-color:rgba(63,109,17,.18)}
.sync-status.warn{background:var(--amber-l);color:var(--amber);border-color:rgba(181,113,15,.18)}
.sync-status.bad{background:var(--red-l);color:var(--red);border-color:rgba(168,51,43,.18)}

@media(max-width:900px){
  body.nav-open{overflow:hidden}
  .mobile-menu-btn{display:inline-flex;flex:0 0 auto}
  .topline{
    display:grid;
    grid-template-columns:auto minmax(0,1fr);
    align-items:start;
    gap:12px;
  }
  .topline .user{
    grid-column:1 / -1;
    width:100%;
    text-align:left;
  }
  .side{
    position:fixed;
    inset:0 auto 0 0;
    width:min(84vw,320px);
    height:100dvh;
    transform:translateX(-105%);
    transition:transform .18s ease;
    box-shadow:0 18px 60px rgba(0,0,0,.28);
    z-index:80;
  }

<script>
/* ==========================================================================
   FXL OPERACIONAL SIMPLES — JS local, sem dependências.
   Mantém operação simples com localStorage, CRUD, filtros, import/export.
   ========================================================================== */

(function(){
  'use strict';

  const STORAGE_KEY = 'fxl_operacional_simples_v1';
  const PREF_KEY = 'fxl_operacional_simples_prefs';
  const SUPA_KEY = 'fxl_operacional_supa_config';
  const CURRENT_USER = 'Operador Local';

  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
  const uid = (prefix='id') => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,7)}`;
  const todayISO = () => new Date().toISOString().slice(0,10);
  const brDate = (value) => {
    if(!value) return '—';
    const [y,m,d] = String(value).slice(0,10).split('-');
    return y && m && d ? `${d}/${m}/${y}` : value;
  };
  const money = (value) => Number(value || 0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  const escapeHTML = (str='') => String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const normalizeText = (str='') => String(str).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const byId = (arr, id) => arr.find(x => x.id === id);

  const state = {
    route:'dashboard',
    filters:{
      kanban:{q:'',status:'',vendedor:'',servico:'',min:'',max:''},
      followups:{periodo:'month',vendedor:'',view:'lista'},
      comercial:{periodo:'all',from:'',to:''},
      financeiro:{q:'',status:'',type:'',from:'',to:''},
      vendas:{q:'',status:'',from:'',to:''},
      clientes:{q:'',status:''},
      servicos:{q:'',status:''},
      profissionais:{q:'',status:''}
    },
    chartModes:{
      funil:'horizontal',
      composicao:'vertical',
      origem:'pie'
    },
    kanbanView:'kanban'
  };

  const seed = () => ({
    schemaVersion:1,
    clientes:[
      {id:uid('cli'),nome:'Clínica Aurora',email:'contato@aurora.com',telefone:'(11) 98888-1001',documento:'12.345.678/0001-90',status:'ativo',observacoes:'Cliente recorrente.',criadoEm:'2026-01-02',atualizadoEm:'2026-01-02'},
      {id:uid('cli'),nome:'Studio Norte',email:'financeiro@studionorte.com',telefone:'(21) 97777-2210',documento:'',status:'ativo',observacoes:'Atendimento mensal.',criadoEm:'2026-01-07',atualizadoEm:'2026-01-07'},
      {id:uid('cli'),nome:'Mercado Ramos',email:'compras@ramos.com',telefone:'(31) 96666-3120',documento:'',status:'ativo',observacoes:'Venda pontual.',criadoEm:'2026-02-01',atualizadoEm:'2026-02-01'}
    ],
    servicos:[
      {id:uid('srv'),nome:'Gestão operacional mensal',categoria:'Mensalidade',valor:2800,status:'ativo',descricao:'Acompanhamento operacional e financeiro mensal.',criadoEm:'2026-01-02',atualizadoEm:'2026-01-02'},
      {id:uid('srv'),nome:'Implantação comercial',categoria:'Projeto',valor:6500,status:'ativo',descricao:'Diagnóstico, organização e implantação de processo comercial.',criadoEm:'2026-01-04',atualizadoEm:'2026-01-04'},
      {id:uid('srv'),nome:'Consultoria avulsa',categoria:'Avulso',valor:950,status:'ativo',descricao:'Sessão estratégica avulsa.',criadoEm:'2026-01-04',atualizadoEm:'2026-01-04'}
    ],
    profissionais:[
      {id:uid('pro'),nome:'Marina Costa',funcao:'Gestora de Operações',email:'marina@empresa.com',telefone:'(11) 90000-1000',status:'ativo',custoHora:120,criadoEm:'2026-01-02',atualizadoEm:'2026-01-02'},
      {id:uid('pro'),nome:'Rafael Lima',funcao:'Comercial',email:'rafael@empresa.com',telefone:'(11) 90000-2000',status:'ativo',custoHora:90,criadoEm:'2026-01-03',atualizadoEm:'2026-01-03'},
      {id:uid('pro'),nome:'Paula Martins',funcao:'Financeiro',email:'paula@empresa.com',telefone:'(11) 90000-3000',status:'ativo',custoHora:85,criadoEm:'2026-01-03',atualizadoEm:'2026-01-03'}
    ],
    oportunidades:[
      {id:uid('opp'),contato:'Heitor',empresa:'',telefone:'',email:'',servicoId:'',servicoNome:'Gravação em Estúdio',profissionalId:'',origem:'Orgânico',etapa:'lead_novo',status:'em_andamento',valor:1500,dataEntrada:'2026-05-03',dataFechamento:'',followup:'2026-06-02',observacoes:'Oportunidade de exemplo para operação comercial.',custos:[],historico:[],criadoEm:'2026-05-03',atualizadoEm:'2026-05-03'},
      {id:uid('opp'),contato:'Marina Siqueira',empresa:'',telefone:'',email:'',servicoId:'',servicoNome:'Open Mic - Audio',profissionalId:'',origem:'Tráfego pago',etapa:'qualificado',status:'em_andamento',valor:500,dataEntrada:'2026-04-18',dataFechamento:'',followup:'2026-06-04',observacoes:'Interessada em pacote simples.',custos:[],historico:[],criadoEm:'2026-04-18',atualizadoEm:'2026-04-18'},
      {id:uid('opp'),contato:'Morello',empresa:'',telefone:'',email:'',servicoId:'',servicoNome:'Produção Musical Completa',profissionalId:'',origem:'Orgânico',etapa:'negociacao',status:'em_andamento',valor:10600,dataEntrada:'2026-03-03',dataFechamento:'',followup:'2026-06-07',observacoes:'Negociação em andamento.',custos:[],historico:[],criadoEm:'2026-03-03',atualizadoEm:'2026-03-03'},
      {id:uid('opp'),contato:'Myckael Santana',empresa:'Real Santana',telefone:'',email:'',servicoId:'',servicoNome:'Open Mic - Audio',profissionalId:'',origem:'Orgânico',etapa:'fechado_ganho',status:'ganho',valor:400,dataEntrada:'2026-05-07',dataFechamento:'2026-05-07',followup:'',observacoes:'Fechado como exemplo.',custos:[],historico:[],criadoEm:'2026-05-07',atualizadoEm:'2026-05-07'}
    ],
    vendas:[],
    contas:[],
    audit:[]
  });

  let DB = loadDB();

  function loadDB(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw){
        const initial = seed();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(initial));
        return initial;
      }
      const parsed = JSON.parse(raw);
      return normalizeDB(parsed);
    }catch(err){
      console.error(err);
      return seed();
    }
  }

  function normalizeDB(db){
    const base = seed();
    const normalized = Object.assign(base, db || {});
    ['clientes','servicos','profissionais','oportunidades','vendas','contas','audit'].forEach(k => {
      if(!Array.isArray(normalized[k])) normalized[k] = [];
    });
    normalized.oportunidades.forEach(o => {
      if(!Array.isArray(o.followups)) o.followups = [];
      if(o.followup && !o.followups.some(f => f.legacy === true && f.data === o.followup)){
        o.followups.push({
          id:uid('fol'),
          titulo:'Follow-up',
          data:o.followup,
          hora:'',
          status:o.status === 'ganho' ? 'concluido' : 'pendente',
          descricao:o.observacoes || '',
          legacy:true,
          criadoEm:o.criadoEm || todayISO(),
          atualizadoEm:o.atualizadoEm || todayISO()
        });
      }
    });
    normalized.schemaVersion = 3;
    return normalized;
  }

  function saveDB(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
  }

  function audit(entity, action, before, after, reason=''){
    DB.audit.unshift({
      id:uid('aud'),
      entity,
      action,
      before: before ? JSON.parse(JSON.stringify(before)) : null,
      after: after ? JSON.parse(JSON.stringify(after)) : null,
      reason,
      user:CURRENT_USER,
      createdAt:new Date().toISOString()
    });
    DB.audit = DB.audit.slice(0,300);
  }

  function toast(msg){
    const box = document.createElement('div');
    box.textContent = msg;
    $('#toast').appendChild(box);
    setTimeout(() => box.remove(), 3600);
  }

  function setRoute(route){
    state.route = route;
    $$('.nav').forEach(n => n.classList.toggle('active', n.dataset.route === route));
    render();
    $('#main').focus({preventScroll:true});
  }

  function pageMeta(title, desc){
    $('#topTitle').textContent = title;
    $('#topDesc').textContent = desc;
  }

  function openModal(title, bodyHTML, footHTML, onMount){
    $('#modalTitle').textContent = title;
    $('#modalBody').innerHTML = bodyHTML;
    $('#modalFoot').innerHTML = footHTML || '';
    $('#scrim').classList.add('on');
    $('#modal').classList.add('on');
    if(typeof onMount === 'function') onMount($('#modal'));
    const first = $('#modalBody input, #modalBody select, #modalBody textarea, #modalFoot button');
    if(first) setTimeout(()=>first.focus(), 30);
  }

  function closeModal(){
    $('#modal').classList.remove('on');
    $('#scrim').classList.remove('on');
    $('#modalBody').innerHTML = '';
    $('#modalFoot').innerHTML = '';
  }

  function confirmAction(title, message, confirmText, cb, needsReason=false){
    openModal(
      title,
      `<p class="note">${escapeHTML(message)}</p>
       ${needsReason ? `<div class="fld"><label for="reason">Motivo</label><textarea id="reason" required placeholder="Informe o motivo da ação"></textarea></div>` : ''}`,
      `<button class="btn ghost" type="button" data-close>Cancelar</button>
       <button class="btn red" type="button" id="confirmBtn">${escapeHTML(confirmText)}</button>`,
      () => {
        $('[data-close]').onclick = closeModal;
        $('#confirmBtn').onclick = () => {
          const reason = needsReason ? $('#reason').value.trim() : '';
          if(needsReason && !reason){ toast('Informe o motivo.'); $('#reason').focus(); return; }
          cb(reason);
          closeModal();
        };
      }
    );
  }

  function formValue(id){ return $(`#${id}`)?.value?.trim() || ''; }
  function numberValue(id){ return Number(String($(`#${id}`)?.value || '0').replace(',','.')) || 0; }

  function meta(record, isNew){
    const now = todayISO();
    return Object.assign({}, record, {
      criadoEm: record.criadoEm || now,
      atualizadoEm: now,
      criadoPor: record.criadoPor || CURRENT_USER,
      atualizadoPor: CURRENT_USER
    });
  }

  function validateEmail(email){
    if(!email) return true;
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function validateDuplicate(entity, id, fields){
    const list = DB[entity] || [];
    return list.find(item => item.id !== id && fields.some(f => item[f] && fields.includes(f) && normalizeText(item[f]) === normalizeText($(`#${f}`)?.value || '')));
  }

  function statusBadge(status){
    const map = {
      ativo:['b-ok','Ativo'],
      inativo:['b-neu','Inativo'],
      aberto:['b-prev','Aberto'],
      pago:['b-ok','Pago'],
      recebido:['b-ok','Recebido'],
      atrasado:['b-bad','Atrasado'],
      cancelado:['b-bad','Cancelado'],
      rascunho:['b-neu','Rascunho'],
      fechado:['b-ok','Fechado']
    };
    const [cls,label] = map[status] || ['b-neu', status || '—'];
    return `<span class="bdg ${cls}">${escapeHTML(label)}</span>`;
  }

  function getName(entity, id){
    return byId(DB[entity] || [], id)?.nome || '—';
  }

  function filtered(list, filter, searchFields){
    const q = normalizeText(filter.q || '');
    return list.filter(item => {
      if(q && !searchFields.some(f => normalizeText(item[f] || '').includes(q))) return false;
      if(filter.status && item.status !== filter.status) return false;
      if(filter.type && item.tipo !== filter.type) return false;
      const date = item.data || item.vencimento || item.criadoEm || '';
      if(filter.from && date && date < filter.from) return false;
      if(filter.to && date && date > filter.to) return false;
      return true;
    });
  }

  function filterButton(route, fieldsHTML){
    return `
      <div class="filter-wrap">
        <button class="btn ghost" type="button" data-filter-toggle>Filtrar por</button>
        <div class="filter-pop" data-filter-pop>
          <div class="filter-grid">${fieldsHTML}</div>
          <div class="toolbar" style="margin:10px 0 0">
            <div></div>
            <div class="tool-right">
              <button class="btn ghost" type="button" data-clear-filters="${route}">Limpar filtros</button>
              <button class="btn teal" type="button" data-filter-close>Aplicar</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  function bindFilterPop(){
    $$('[data-filter-toggle]').forEach(btn => {
      btn.onclick = () => {
        const pop = btn.parentElement.querySelector('[data-filter-pop]');
        pop.classList.toggle('on');
      };
    });
    $$('[data-filter-close]').forEach(btn => btn.onclick = () => btn.closest('[data-filter-pop]').classList.remove('on'));
    $$('[data-clear-filters]').forEach(btn => {
      btn.onclick = () => {
        const route = btn.dataset.clearFilters;
        Object.keys(state.filters[route]).forEach(k => state.filters[route][k] = '');
        render();
      };
    });
    document.addEventListener('click', ev => {
      if(!ev.target.closest('.filter-wrap')) $$('.filter-pop.on').forEach(p=>p.classList.remove('on'));
    }, {once:true});
  }

  function metrics(){
    const vendasFechadas = DB.vendas.filter(v => v.status === 'fechado');
    const receita = vendasFechadas.reduce((s,v)=>s+Number(v.valor||0),0);
    const receberAberto = DB.contas.filter(c=>c.tipo==='receber' && c.status==='aberto').reduce((s,c)=>s+Number(c.valor||0),0);
    const pagarAberto = DB.contas.filter(c=>c.tipo==='pagar' && c.status==='aberto').reduce((s,c)=>s+Number(c.valor||0),0);
    const saldoPrev = receberAberto - pagarAberto;
    return {receita,receberAberto,pagarAberto,saldoPrev,vendas:vendasFechadas.length,clientes:DB.clientes.filter(c=>c.status==='ativo').length};
  }

  function renderDashboard(){
    pageMeta('Dashboard','Visão simples do financeiro, vendas e operação.');
    const m = metrics();
    const ultimasVendas = DB.vendas.slice(0,5);
    const proximas = DB.contas.filter(c=>c.status==='aberto').sort((a,b)=>String(a.vencimento).localeCompare(String(b.vencimento))).slice(0,6);
    const max = Math.max(m.receita, m.receberAberto, m.pagarAberto, 1);
    $('#content').innerHTML = `
      <div class="grid metrics">
        <article class="metric"><div class="lab">Receita fechada</div><div class="val">${money(m.receita)}</div><div class="sub">${m.vendas} vendas fechadas</div></article>
        <article class="metric"><div class="lab">A receber aberto</div><div class="val">${money(m.receberAberto)}</div><div class="sub">Próximos vencimentos</div></article>
        <article class="metric"><div class="lab">A pagar aberto</div><div class="val">${money(m.pagarAberto)}</div><div class="sub">Compromissos em aberto</div></article>
        <article class="metric"><div class="lab">Saldo previsto</div><div class="val">${money(m.saldoPrev)}</div><div class="sub">${m.clientes} clientes ativos</div></article>
      </div>

      <div class="split">
        <section class="panel">
          <div class="panel-head"><h3>Resumo financeiro</h3><button class="btn sm ghost" data-route-go="financeiro" type="button">Ver contas</button></div>
          <div class="chart-bars">
            ${bar('Receita', m.receita, max)}
            ${bar('A receber', m.receberAberto, max)}
            ${bar('A pagar', m.pagarAberto, max)}
          </div>
        </section>
        <section class="panel">
          <div class="panel-head"><h3>Ações rápidas</h3></div>
          <div class="grid" style="grid-template-columns:repeat(2,minmax(0,1fr));gap:10px">
            <button class="btn teal" data-new="oportunidade" type="button">Nova oportunidade</button>
            <button class="btn teal" data-new="venda" type="button">Registrar venda</button>
            <button class="btn ghost" data-new="conta-receber" type="button">Nova conta a receber</button>
            <button class="btn ghost" data-new="conta-pagar" type="button">Nova conta a pagar</button>
            <button class="btn ghost" data-route-go="arquivos" type="button">Importar / Exportar</button>
          </div>
        </section>
      </div>

      <div class="split">
        <section class="panel">
          <div class="panel-head"><h3>Últimas vendas</h3><button class="btn sm ghost" data-route-go="vendas" type="button">Ver vendas</button></div>
          ${ultimasVendas.length ? `<div class="list">${ultimasVendas.map(v=>`
            <div class="item"><strong>${escapeHTML(getName('clientes',v.clienteId))}</strong><small>${brDate(v.data)} · ${money(v.valor)} · ${statusBadge(v.status)}</small></div>
          `).join('')}</div>` : `<div class="empty">Nenhuma venda registrada ainda.</div>`}
        </section>
        <section class="panel">
          <div class="panel-head"><h3>Próximas contas</h3></div>
          ${proximas.length ? `<div class="list">${proximas.map(c=>`
            <div class="item"><strong>${escapeHTML(c.descricao)}</strong><small>${c.tipo === 'receber' ? 'Receber' : 'Pagar'} · ${brDate(c.vencimento)} · ${money(c.valor)}</small></div>
          `).join('')}</div>` : `<div class="empty">Nenhuma conta aberta.</div>`}
        </section>
      </div>
    `;
    bindGlobalActions();
  }

  function bar(label, value, max){
    const pct = Math.max(2, Math.round((Number(value || 0) / max) * 100));
    return `<div class="bar-row"><span>${escapeHTML(label)}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><b class="mono">${money(value)}</b></div>`;
  }

  function renderFinanceiro(){
    pageMeta('Contas a pagar e receber','Controle simples dos compromissos financeiros.');
    const f = state.filters.financeiro;
    const rows = filtered(DB.contas, f, ['descricao','categoria','observacoes']).sort((a,b)=>String(a.vencimento).localeCompare(String(b.vencimento)));
    const totalReceber = rows.filter(c=>c.tipo==='receber').reduce((s,c)=>s+Number(c.valor||0),0);
    const totalPagar = rows.filter(c=>c.tipo==='pagar').reduce((s,c)=>s+Number(c.valor||0),0);
    $('#content').innerHTML = `
      <div class="page-header">
        <div class="page-title"><h2>Financeiro</h2><p>Registre entradas e saídas sem complexidade.</p></div>
        <div class="page-actions">
          ${filterButton('financeiro', `
            ${inputFilter('financeiro','q','Buscar','Texto')}
            ${selectFilter('financeiro','type','Tipo',[['','Todos'],['receber','A receber'],['pagar','A pagar']])}
            ${selectFilter('financeiro','status','Status',[['','Todos'],['aberto','Aberto'],['pago','Pago/Recebido'],['cancelado','Cancelado']])}
            ${inputFilter('financeiro','from','De','date')}
            ${inputFilter('financeiro','to','Até','date')}
          `)}
          <button class="btn ghost" data-export-csv="contas" type="button">Exportar CSV</button>
          <button class="btn teal" data-new="conta-receber" type="button">A receber</button>
          <button class="btn" data-new="conta-pagar" type="button">A pagar</button>
        </div>
      </div>
      <div class="grid metrics">
        <article class="metric"><div class="lab">Total a receber</div><div class="val">${money(totalReceber)}</div><div class="sub">Na lista filtrada</div></article>
        <article class="metric"><div class="lab">Total a pagar</div><div class="val">${money(totalPagar)}</div><div class="sub">Na lista filtrada</div></article>
        <article class="metric"><div class="lab">Saldo</div><div class="val">${money(totalReceber-totalPagar)}</div><div class="sub">Receber - pagar</div></article>
        <article class="metric"><div class="lab">Registros</div><div class="val">${rows.length}</div><div class="sub">Contas encontradas</div></article>
      </div>
      <section class="panel">
        <div class="table-scroll">
          <table>
            <thead><tr><th>Tipo</th><th>Descrição</th><th>Vencimento</th><th>Status</th><th class="num">Valor</th><th></th></tr></thead>
            <tbody>
              ${rows.length ? rows.map(c => `
                <tr>
                  <td>${c.tipo === 'receber' ? 'A receber' : 'A pagar'}</td>
                  <td><strong>${escapeHTML(c.descricao)}</strong><br><small>${escapeHTML(c.categoria || 'Sem categoria')}</small></td>
                  <td>${brDate(c.vencimento)}</td>
                  <td>${statusBadge(c.status)}</td>
                  <td class="num">${money(c.valor)}</td>
                  <td><div class="actions">
                    ${c.status === 'aberto' ? `<button class="btn sm ghost" data-pay="${c.id}" type="button">${c.tipo==='receber'?'Receber':'Pagar'}</button>` : ''}
                    <button class="btn sm ghost" data-edit-conta="${c.id}" type="button">Editar</button>
                    <button class="btn sm red" data-delete-conta="${c.id}" type="button">Excluir</button>
                  </div></td>
                </tr>`).join('') : `<tr><td colspan="6"><div class="empty">Nenhuma conta encontrada.</div></td></tr>`}
            </tbody>
          </table>
        </div>
      </section>
    `;
    bindFilters('financeiro');
    bindGlobalActions();
    $$('[data-pay]').forEach(btn => btn.onclick = () => payConta(btn.dataset.pay));
    $$('[data-edit-conta]').forEach(btn => btn.onclick = () => modalConta(byId(DB.contas, btn.dataset.editConta)));
    $$('[data-delete-conta]').forEach(btn => btn.onclick = () => deleteEntity('contas', btn.dataset.deleteConta, 'conta'));
  }


  const KANBAN_STAGES = [
    ['lead_novo','Lead novo','var(--ink-2)'],
    ['em_contato','Em contato','var(--teal)'],
    ['qualificado','Qualificado','#2f9bb5'],
    ['proposta_enviada','Proposta enviada','var(--amber)'],
    ['negociacao','Negociação','#cf6c1b'],
    ['fechado_ganho','Fechado ganho','var(--green)'],
    ['fechado_perdido','Fechado perdido','var(--red)']
  ];

  function stageLabel(stage){
    return (KANBAN_STAGES.find(s=>s[0]===stage) || [stage, stage, 'var(--ink-2)'])[1];
  }

  function opportunityServiceName(o){
    return o.servicoId ? getName('servicos', o.servicoId) : (o.servicoNome || '—');
  }

  function opportunitySellerName(o){
    return o.profissionalId ? getName('profissionais', o.profissionalId) : 'Sem vendedor';
  }

  function filteredOpportunities(){
    const f = state.filters.kanban;
    const q = normalizeText(f.q || '');
    return (DB.oportunidades || []).filter(o => {
      if(q && ![o.contato,o.empresa,o.email,o.telefone,o.origem,o.observacoes,opportunityServiceName(o),opportunitySellerName(o)].some(v=>normalizeText(v||'').includes(q))) return false;
      if(f.status && o.status !== f.status) return false;
      if(f.vendedor && o.profissionalId !== f.vendedor) return false;
      if(f.servico && o.servicoId !== f.servico) return false;
      if(f.min && Number(o.valor||0) < Number(f.min)) return false;
      if(f.max && Number(o.valor||0) > Number(f.max)) return false;
      return true;
    });
  }

  function followupStatus(f){
    if(f.status === 'concluido') return 'concluido';
    if(f.data && f.data < todayISO()) return 'atrasado';
    return 'pendente';
  }

  function followupBadge(status){
    if(status === 'concluido') return '<span class="bdg b-ok">Concluído</span>';
    if(status === 'atrasado') return '<span class="bdg b-bad">Atrasado</span>';
    return '<span class="bdg b-prev">Pendente</span>';
  }

  function getOpportunityFollowups(o){
    if(!o) return [];
    const list = Array.isArray(o.followups) ? o.followups.slice() : [];
    if(o.followup && !list.some(f => f.data === o.followup && f.legacy)){
      list.push({id:'legacy_'+o.id,titulo:'Follow-up',data:o.followup,hora:'',status:o.status === 'ganho' ? 'concluido' : 'pendente',descricao:o.observacoes || '',legacy:true});
    }
    return list
      .filter(f => f && f.data)
      .map(f => Object.assign({}, f, {status:followupStatus(f)}))
      .sort((a,b) => String(a.data||'').localeCompare(String(b.data||'')) || String(a.hora||'').localeCompare(String(b.hora||'')));
  }

  function getAllFollowups(){
    return (DB.oportunidades || []).flatMap(o => getOpportunityFollowups(o).map(f => ({
      id:f.id,
      oportunidadeId:o.id,
      contato:o.contato || '',
      empresa:o.empresa || '',
      vendedor:opportunitySellerName(o),
      profissionalId:o.profissionalId || '',
      servico:opportunityServiceName(o),
      etapa:o.etapa || '',
      valor:Number(o.valor||0),
      data:f.data || '',
      hora:f.hora || '',
      titulo:f.titulo || f.texto || 'Follow-up',
      descricao:f.descricao || '',
      status:followupStatus(f)
    })));
  }

  function filteredFollowups(){
    const f = state.filters.followups || {};
    const now = new Date();
    const today = todayISO();
    const addDays = (days) => {
      const d = new Date(now);
      d.setDate(d.getDate()+days);
      return d.toISOString().slice(0,10);
    };
    const startOfWeek = () => {
      const d = new Date(now);
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      return d.toISOString().slice(0,10);
    };
    const endOfWeek = () => {
      const d = new Date(now);
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 7);
      return d.toISOString().slice(0,10);
    };
    const startMonth = `${today.slice(0,7)}-01`;
    const endMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);
    return getAllFollowups().filter(item => {
      if(f.vendedor && item.profissionalId !== f.vendedor) return false;
      if(f.periodo === 'today' && item.data !== today) return false;
      if(f.periodo === 'week' && (item.data < startOfWeek() || item.data > endOfWeek())) return false;
      if((!f.periodo || f.periodo === 'month') && (item.data < startMonth || item.data > endMonth)) return false;
      if(f.periodo === 'next90' && (item.data < today || item.data > addDays(90))) return false;
      return true;
    }).sort((a,b) => String(a.data||'').localeCompare(String(b.data||'')) || String(a.hora||'').localeCompare(String(b.hora||'')));
  }

  function kanbanSubTabs(active){
    const followCount = getAllFollowups().filter(f=>f.status!=='concluido').length;
    return `<div class="kanban-page-tabs" role="tablist" aria-label="Visualizações de oportunidades">
      <button class="kanban-page-tab ${active==='kanban'?'active':''}" type="button" data-kanban-view="kanban">Kanban</button>
      <button class="kanban-page-tab ${active==='followups'?'active':''}" type="button" data-kanban-view="followups">Follow-ups <span class="tab-count">${followCount}</span></button>
      <button class="kanban-page-tab ${active==='ranking'?'active':''}" type="button" data-kanban-view="ranking">Ranking</button>
      <button class="kanban-page-tab ${active==='registros'?'active':''}" type="button" data-kanban-view="registros">Registros de Vendas</button>
    </div>`;

    $$('[data-follow-period]').forEach(btn => btn.onclick = () => {

  function completeFollowup(oppId, followId){
    const o = byId(DB.oportunidades, oppId);
    if(!o) return;
    const before = JSON.parse(JSON.stringify(o));
    if(!Array.isArray(o.followups)) o.followups = [];
    let target = o.followups.find(f => f.id === followId);
    if(!target && String(followId).startsWith('legacy_') && o.followup){
      target = {id:uid('fol'),titulo:'Follow-up',data:o.followup,hora:'',status:'pendente',descricao:o.observacoes || '',legacy:true};
      o.followups.push(target);
    }
    if(target){
      target.status = 'concluido';
      target.concluidoEm = new Date().toISOString();
      target.atualizadoEm = todayISO();
    }
    if(o.followup === target?.data) o.followup = '';
    o.historico = Array.isArray(o.historico) ? o.historico : [];
    o.historico.unshift({id:uid('his'),tipo:'follow-up',texto:`Follow-up concluído: ${target?.titulo || 'ação'}`,createdAt:new Date().toISOString(),user:CURRENT_USER});
    o.atualizadoEm = todayISO();
    audit('oportunidades','complete-followup',before,o,'Follow-up concluído');
    saveDB();
    toast('Follow-up concluído.');
    renderKanban();
  }

            ${selectFilter('kanban','vendedor','Vendedor',[['','Todos'],...DB.profissionais.filter(p=>p.status!=='inativo').map(p=>[p.id,p.nome])])}
            ${selectFilter('kanban','servico','Serviço',[['','Todos'],...DB.servicos.filter(s=>s.status!=='inativo').map(s=>[s.id,s.nome])])}
            ${inputFilter('kanban','min','Valor mín','number')}

  function bindKanban(){
    let draggedId = null;
    $$('.opp-card').forEach(card => {
      card.addEventListener('dragstart', ev => {
        draggedId = card.dataset.oppId;
        card.classList.add('is-dragging');
        ev.dataTransfer.effectAllowed = 'move';
        ev.dataTransfer.setData('text/plain', draggedId);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('is-dragging');
        draggedId = null;
        $$('.kanban-col').forEach(c=>c.classList.remove('is-over'));
      });
    });
    $$('.kanban-col').forEach(col => {
      col.addEventListener('dragover', ev => {
        ev.preventDefault();
        col.classList.add('is-over');
      });
      col.addEventListener('dragleave', () => col.classList.remove('is-over'));
      col.addEventListener('drop', ev => {
        ev.preventDefault();
        col.classList.remove('is-over');
        const id = ev.dataTransfer.getData('text/plain') || draggedId;
        moveOpportunity(id, col.dataset.stage);
      });
    });
    $$('[data-edit-opp]').forEach(btn => btn.onclick = () => modalOportunidade(byId(DB.oportunidades, btn.dataset.editOpp)));
    $$('[data-move-opp]').forEach(btn => btn.onclick = () => modalMoverOportunidade(byId(DB.oportunidades, btn.dataset.moveOpp)));
    $$('[data-delete-opp]').forEach(btn => btn.onclick = () => deleteOportunidade(btn.dataset.deleteOpp));
  }

  function moveOpportunity(id, stage){
    const o = byId(DB.oportunidades, id);
    if(!o || !stage || o.etapa === stage) return;
    if(stage === 'fechado_ganho'){
      modalRegistrarVendaOportunidade(o, stage);
      return;
    }
    const before = Object.assign({}, o);
    o.etapa = stage;
    o.status = stage === 'fechado_perdido' ? 'perdido' : 'em_andamento';
    o.dataFechamento = stage === 'fechado_perdido' ? (o.dataFechamento || todayISO()) : (stage === 'fechado_ganho' ? (o.dataFechamento || todayISO()) : '');
    o.atualizadoEm = todayISO();
    o.atualizadoPor = CURRENT_USER;
    o.historico = Array.isArray(o.historico) ? o.historico : [];
    o.historico.unshift({id:uid('his'),tipo:'movimento',texto:`Movido para ${stageLabel(stage)}`,createdAt:new Date().toISOString(),user:CURRENT_USER});
    audit('oportunidades','move',before,o,`Movido para ${stageLabel(stage)}`);
    saveDB();
    toast('Oportunidade movida.');
    render();
  }

  function modalMoverOportunidade(o){
    if(!o) return;
    openModal('Mover oportunidade',
      `<p class="note">Selecione a fase para mover: ${escapeHTML(o.contato || 'oportunidade')}.</p>
       <div class="fld"><label for="moveStage">Fase do Kanban</label><select id="moveStage">${KANBAN_STAGES.map(([key,label])=>`<option value="${key}" ${o.etapa===key?'selected':''}>${label}</option>`).join('')}</select></div>`,
      `<button class="btn ghost" type="button" data-close>Cancelar</button><button class="btn teal" id="saveMoveOpp" type="button">Mover</button>`,
      () => {
        $('[data-close]').onclick = closeModal;
        $('#saveMoveOpp').onclick = () => {
          const stage = formValue('moveStage');
          closeModal();
          moveOpportunity(o.id, stage);
        };
      }
    );

  function normalizeOpportunityCost(c, fallbackIndex=0){
    const value = Number(c?.valor || 0);
    return {
      id:c?.id || uid('cst'),
      descricao:c?.descricao || c?.nome || `Custo ${fallbackIndex+1}`,
      categoria:c?.categoria || 'Operacional',
      responsavel:c?.responsavel || '',
      profissionalId:c?.profissionalId || '',
      valor:value,
      parcelas:Number(c?.parcelas || c?.parc || 1),
      frequencia:c?.frequencia || c?.freq || 'única',
      origem:c?.origem || 'manual'
    };
  }

  function defaultOpportunityCosts(o){
    const existing = Array.isArray(o?.custos) ? o.custos.filter(c => c && (c.descricao || c.valor || c.categoria)) : [];
    if(existing.length) return existing.map(normalizeOpportunityCost);
    const valor = Number(o?.valor || 0);
    const seller = opportunitySellerName(o || {});
    if(valor <= 0) return [];
    return [
      normalizeOpportunityCost({descricao:'Comissão (10%)',categoria:'Comissão',responsavel:seller,profissionalId:o?.profissionalId || '',valor:round2(valor * .10),parcelas:1,frequencia:'única',origem:'clonado'},0),
      normalizeOpportunityCost({descricao:'Imposto (10%)',categoria:'Imposto',responsavel:'Imposto',valor:round2(valor * .10),parcelas:1,frequencia:'única',origem:'clonado'},1)
    ];
  }

  function round2(n){
    return Math.round((Number(n || 0) + Number.EPSILON) * 100) / 100;
  }

  function opportunityCostsTotal(costs){
    return (costs || []).reduce((s,c)=>s+Number(c.valor || 0),0);
  }

  function opportunityMargin(o, costs){
    const receita = Number(o?.valor || 0);
    const total = opportunityCostsTotal(costs);
    return receita - total;
  }

  function costColor(index){
    return ['var(--teal)','var(--amber)','var(--red)','var(--green)','var(--ink-2)'][index % 5];
  }

  function renderCostRow(c, index){
    const cost = normalizeOpportunityCost(c,index);
    return `<div class="opp-cost-row" data-cost-row>
      <div class="fld"><label>Nome</label><input data-cost-field="descricao" value="${escapeHTML(cost.descricao)}" placeholder="Nome do custo"></div>
      <div class="fld"><label>Categoria</label><input data-cost-field="categoria" value="${escapeHTML(cost.categoria)}" placeholder="Categoria"></div>
      <div class="fld"><label>Responsável</label><input data-cost-field="responsavel" value="${escapeHTML(cost.responsavel)}" placeholder="Responsável"></div>
      <div class="fld"><label>Valor</label><input data-cost-field="valor" type="number" step="0.01" value="${Number(cost.valor || 0)}"></div>

  function collectOpportunityCostsFromDOM(){
    const list = $('#oppCostsList');
    if(!list) return parseCustos(formValue('custosTexto'));
    return $$('[data-cost-row]', list).map((row, index) => {
      const read = name => row.querySelector(`[data-cost-field="${name}"]`)?.value || '';
      return normalizeOpportunityCost({
        id:read('id') || uid('cst'),
        descricao:read('descricao'),
        categoria:read('categoria'),
        responsavel:read('responsavel'),
        valor:Number(read('valor') || 0),
        parcelas:Number(read('parcelas') || 1),
        frequencia:read('frequencia') || 'única',
        origem:read('origem') || 'manual'
      }, index);
    }).filter(c => c.descricao || c.valor);
  }

  function updateCostSummary(){
    const revenueInput = $('#valor');
    const receita = Number(revenueInput?.value || 0);
    const costs = collectOpportunityCostsFromDOM();
    const total = opportunityCostsTotal(costs);
    const margin = receita - total;
    const pct = receita > 0 ? (margin / receita) * 100 : 0;
    const summary = $('#costSummaryDynamic');
    if(!summary) return;
    summary.innerHTML = `
      <div class="cost-summary-head"><span>📊 Resumo Executivo</span><button class="btn sm ghost" type="button" id="toggleCostDetails">Ocultar detalhes</button></div>
      <div class="cost-summary-grid">
        <div class="cost-summary-line"><span>Receita (Valor da Venda)</span><strong>${money(receita)}</strong></div>
        <div class="cost-summary-line"><span>Custos Operacionais</span><strong>${money(total)}</strong></div>
        ${costs.map(c=>`<div class="cost-summary-line danger"><span>${escapeHTML(c.descricao)}</span><strong>- ${money(c.valor)}</strong></div>`).join('')}
        <div class="cost-summary-line ok"><span>💰 Margem</span><strong>${money(margin)} (${pct.toFixed(1)}%)</strong></div>
      </div>
      <div class="cost-composition" title="Composição dos custos">
        ${costs.length ? costs.map((c,i)=>`<span style="width:${total ? Math.max((Number(c.valor||0)/total)*100,2) : 0}%;background:${costColor(i)}"></span>`).join('') : '<span style="width:100%;background:var(--line)"></span>'}
      </div>
      <small class="muted">Composição dos custos: ${costs.map((c,i)=>`${escapeHTML(c.categoria || c.descricao)} ${total ? ((Number(c.valor||0)/total)*100).toFixed(1) : '0.0'}%`).join(' · ') || 'sem custos'}</small>
    `;
    const toggle = $('#toggleCostDetails');
    if(toggle) toggle.onclick = () => {
      const list = $('#oppCostsList');
      if(!list) return;
      list.hidden = !list.hidden;
      toggle.textContent = list.hidden ? 'Mostrar detalhes' : 'Ocultar detalhes';
    };

  function opportunitySaleRecord(o){
    if(!o) return null;
    return (DB.vendas || []).find(v => v.id === o.vendaId || v.oportunidadeId === o.id) || null;
  }

  function opportunityReceivableRows(o){
    const sale = opportunitySaleRecord(o);
    return (DB.contas || []).filter(c => c.tipo === 'receber' && (c.vendaId === sale?.id || c.oportunidadeId === o?.id));
  }

  function opportunityPayableRows(o){
    const sale = opportunitySaleRecord(o);
    return (DB.contas || []).filter(c => c.tipo === 'pagar' && (c.vendaId === sale?.id || c.oportunidadeId === o?.id));
  }

  function parseCustos(texto){
    return String(texto||'').split('\n').map(line=>line.trim()).filter(Boolean).map(line=>{
      const parts = line.split(':');
      const valor = parts.length > 1 ? Number(String(parts.pop()).replace(',','.')) || 0 : 0;
      return {id:uid('cst'),descricao:parts.join(':').trim() || line,valor};
    });
  }

  function saveOportunidade(record){
    const contato = formValue('contato');
    if(!contato){ toast('Informe o contato.'); $('#contato').focus(); return; }
    if(formValue('email') && !validateEmail(formValue('email'))){ toast('Email inválido.'); $('#email').focus(); return; }
    const before = record ? JSON.parse(JSON.stringify(record)) : null;
    const etapa = formValue('etapa') || 'lead_novo';
    const status = etapa === 'fechado_ganho' ? 'ganho' : etapa === 'fechado_perdido' ? 'perdido' : (formValue('status') || 'em_andamento');
    const srv = byId(DB.servicos, formValue('servicoId'));
    const hist = Array.isArray(record?.historico) ? record.historico.slice() : [];
    const followups = Array.isArray(record?.followups) ? record.followups.slice() : [];

    const followTitulo = formValue('followTitulo');
    const followData = formValue('followData');
    if(followTitulo || followData || formValue('followDescricao')){
      if(!followTitulo){ toast('Informe o título do follow-up.'); $('#followTitulo')?.focus(); return; }
      if(!followData){ toast('Informe a data do follow-up.'); $('#followData')?.focus(); return; }
      const newFollow = {
        id:uid('fol'),
        titulo:followTitulo,
        data:followData,
        hora:formValue('followHora'),
        status:formValue('followStatus') || 'pendente',
        descricao:formValue('followDescricao'),
        criadoEm:todayISO(),
        atualizadoEm:todayISO()
      };
      followups.unshift(newFollow);
      hist.unshift({id:uid('his'),tipo:'follow-up',texto:`Criado follow-up: ${followTitulo}`,createdAt:new Date().toISOString(),user:CURRENT_USER});
    }

    const mainFollow = formValue('followup') || (followups.filter(f=>followupStatus(f)!=='concluido').sort((a,b)=>String(a.data||'').localeCompare(String(b.data||'')))[0]?.data || '');

    const payload = meta(Object.assign({}, record || {}, {
      id:record?.id || uid('opp'),
      contato,
      empresa:formValue('empresa'),
      telefone:formValue('telefone'),
      email:formValue('email'),
      profissionalId:formValue('profissionalId'),
      servicoId:formValue('servicoId'),
      servicoNome:srv?.nome || '',
      origem:formValue('origem'),
      etapa,
      status,
      valor:numberValue('valor'),
      dataEntrada:formValue('dataEntrada') || todayISO(),
      dataFechamento:formValue('dataFechamento') || (['ganho','perdido'].includes(status) ? todayISO() : ''),
      followup:mainFollow,
      observacoes:formValue('observacoes'),
      custos:collectOpportunityCostsFromDOM(),
      historico:hist,
      followups
    }), !record);

    if(record){
      DB.oportunidades[DB.oportunidades.findIndex(x=>x.id===record.id)] = payload;
      audit('oportunidades','update',before,payload);
    }else{
      DB.oportunidades.unshift(payload);
      audit('oportunidades','create',null,payload);
    }
    saveDB();
    closeModal();
    toast('Oportunidade salva.');
    if(payload.etapa === 'fechado_ganho' && !payload.vendaId){
      modalRegistrarVendaOportunidade(payload, 'fechado_ganho');
    }else{
      render();
    }
  }

  function findOrCreateClienteFromOpportunity(o){
    const email = normalizeText(o.email || '');
    const phone = normalizeText(o.telefone || '');
    let cliente = DB.clientes.find(c => (email && normalizeText(c.email||'') === email) || (phone && normalizeText(c.telefone||'') === phone) || normalizeText(c.nome||'') === normalizeText(o.empresa || o.contato));
    if(cliente) return cliente;
    cliente = meta({
      id:uid('cli'),
      nome:o.empresa || o.contato,
      email:o.email || '',
      telefone:o.telefone || '',
      documento:'',
      status:'ativo',
      observacoes:`Criado automaticamente pela oportunidade ${o.contato}.`
    }, true);
    DB.clientes.unshift(cliente);
    audit('clientes','create-auto',null,cliente,'Criado ao fechar oportunidade');
    return cliente;
  }

  function closeOpportunityAsSale(o, targetStage){
    if(!formValue('clienteId')){ toast('Selecione o cliente.'); $('#clienteId').focus(); return; }
    if(!formValue('servicoId')){ toast('Selecione o serviço.'); $('#servicoId').focus(); return; }
    const valor = numberValue('valor');
    if(valor <= 0){ toast('Informe um valor válido.'); $('#valor').focus(); return; }
    const beforeOpp = Object.assign({}, o);
    const venda = meta({
      id:uid('ven'),
      data:formValue('data') || todayISO(),
      status:'fechado',
      valor,
      clienteId:formValue('clienteId'),
      servicoId:formValue('servicoId'),
      profissionalId:formValue('profissionalId'),
      vencimento:formValue('vencimento') || formValue('data') || todayISO(),
      oportunidadeId:o.id,
      observacoes:formValue('observacoes'),
      custos:defaultOpportunityCosts(o),
      custoTotal:opportunityCostsTotal(defaultOpportunityCosts(o)),
      margem:valor - opportunityCostsTotal(defaultOpportunityCosts(o))
    }, true);
    DB.vendas.unshift(venda);
    audit('vendas','create-from-opportunity',null,venda,'Venda registrada a partir do Kanban');

    const conta = meta({
      id:uid('cta'),
      tipo:'receber',
      status:'aberto',
      descricao:`Venda — ${getName('clientes', venda.clienteId)}`,
      valor:venda.valor,
      vencimento:venda.vencimento,
      categoria:'Venda',
      vendaId:venda.id,
      observacoes:'Gerado a partir do fechamento da oportunidade.'
    }, true);
    DB.contas.unshift(conta);
    audit('contas','create-auto',null,conta,'Geração por oportunidade ganha');

    const costRows = defaultOpportunityCosts(o);
    costRows.forEach(cost => {
      if(Number(cost.valor || 0) <= 0) return;
      const payable = meta({
        id:uid('cta'),
        tipo:'pagar',
        status:'aberto',
        descricao:cost.descricao || 'Custo da venda',
        valor:Number(cost.valor || 0),
        vencimento:venda.data,
        categoria:cost.categoria || 'Custo',
        responsavel:cost.responsavel || '',
        vendaId:venda.id,
        oportunidadeId:o.id,
        observacoes:`Gerado a partir do custo da oportunidade: ${o.contato || 'oportunidade'}.`
      }, true);
      DB.contas.unshift(payable);
      audit('contas','create-cost-auto',null,payable,'Custo gerado pelo fechamento da oportunidade');
    });

    o.etapa = targetStage || 'fechado_ganho';
    o.status = 'ganho';
    o.dataFechamento = formValue('data') || todayISO();
    o.vendaId = venda.id;
    o.clienteId = venda.clienteId;
    o.servicoId = venda.servicoId;
    o.profissionalId = venda.profissionalId;
    o.valor = venda.valor;
    o.custos = costRows;
    o.custoTotal = opportunityCostsTotal(costRows);
    o.margem = venda.valor - o.custoTotal;
    o.atualizadoEm = todayISO();
    o.atualizadoPor = CURRENT_USER;
    o.historico = Array.isArray(o.historico) ? o.historico : [];
    o.historico.unshift({id:uid('his'),tipo:'fechamento',texto:`Venda registrada: ${money(venda.valor)}`,createdAt:new Date().toISOString(),user:CURRENT_USER});
    audit('oportunidades','close-won',beforeOpp,o,'Fechada como venda');
    saveDB();
    closeModal();
    toast('Venda registrada e oportunidade fechada.');
    render();
  }

  function commercialDateInRange(o, f){
    const ref = o.dataFechamento || o.dataEntrada || o.criadoEm || '';
    if(f.from && ref && ref < f.from) return false;
    if(f.to && ref && ref > f.to) return false;
    if(f.periodo && f.periodo !== 'all'){
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth()+1).padStart(2,'0');
      if(f.periodo === 'month' && !String(ref).startsWith(`${y}-${m}`)) return false;
      if(f.periodo === 'year' && !String(ref).startsWith(String(y))) return false;
      if(f.periodo === 'open' && ['fechado_ganho','fechado_perdido'].includes(o.etapa)) return false;
    }
    return true;
  }

  function commercialRows(){
    const f = state.filters.comercial;
    return (DB.oportunidades || []).filter(o => commercialDateInRange(o, f));
  }

  function commercialStageData(rows){
    return KANBAN_STAGES
      .filter(([key]) => key !== 'fechado_perdido')
      .map(([key,label,color]) => {
        const items = rows.filter(o => o.etapa === key);
        return {
          key,
          label,
          color,
          leads:items.length,
          valor:items.reduce((s,o)=>s+Number(o.valor||0),0)
        };
      });
  }

  function commercialOriginData(rows){
    const map = {};
    rows.forEach(o => {
      const name = o.origem || 'Sem origem';
      if(!map[name]) map[name] = {label:name, leads:0, valor:0};
      map[name].leads += 1;
      map[name].valor += Number(o.valor||0);
    });
    const colors = ['#3347d8','var(--green)','#f0a415','var(--teal)','#cf6c1b','var(--red)','var(--ink-2)'];
    return Object.values(map).sort((a,b)=>b.leads-a.leads).map((item,i)=>Object.assign(item,{color:colors[i % colors.length]}));
  }

  function conversionLabel(current, total){
    if(!total) return '0.0%';
    return `${((current / total) * 100).toFixed(1)}%`;
  }

  function chartTools(key, modes){
    const icons = {
      horizontal:'☰',
      vertical:'▥',
      list:'▦',
      hidden:'◌',
      pie:'◉'
    };
    const labels = {
      horizontal:'Visual horizontal',
      vertical:'Visual vertical',
      list:'Visual em lista',
      hidden:'Ocultar gráfico',
      pie:'Visual em pizza'
    };
    return `<div class="chart-tools" aria-label="Alternar visualização">
      ${modes.map(mode=>`<button class="chart-tool ${state.chartModes[key]===mode?'on':''}" type="button" data-chart-mode="${key}:${mode}" aria-label="${labels[mode]}">${icons[mode]}</button>`).join('')}
    </div>`;
  }

  function chartCard(title, subtitle, key, modes, body){
    return `<section class="panel chart-card ${key === 'funil' ? 'full' : ''}">
      <div class="chart-top">
        <div class="chart-title"><h3>${escapeHTML(title)}</h3><p>${escapeHTML(subtitle)}</p></div>
        ${chartTools(key, modes)}
      </div>
      ${body}
    </section>`;
  }

  function renderStageHorizontal(data){
    const max = Math.max(...data.map(d=>d.leads),1);
    return `<div class="funnel-horizontal">
      ${data.map(d=>`<div class="funnel-row">
        <div class="funnel-label">${escapeHTML(d.label)}</div>
        <div class="funnel-track"><div class="funnel-fill" style="width:${Math.max((d.leads/max)*100,2)}%;background:${d.color}"></div></div>
        <div class="funnel-value">${d.leads} · ${conversionLabel(d.leads, data[0]?.leads || 0)}</div>
      </div>`).join('')}
    </div>`;
  }

  function renderStageVertical(data){
    const max = Math.max(...data.map(d=>d.leads),1);
    return `<div class="vertical-bars">
      ${data.map(d=>`<div class="vbar-item">
        <div class="vbar-number">${d.leads}</div>
        <div class="vbar-wrap"><div class="vbar" style="height:${Math.max((d.leads/max)*100,3)}%;background:${d.color}"></div></div>
        <div class="vbar-label">${escapeHTML(d.label)}</div>
      </div>`).join('')}
    </div>`;
  }

  function renderStageList(data){
    const total = data[0]?.leads || 0;
    return `<div class="composition-list"><table>
      <thead><tr><th>Etapa</th><th class="num">Leads</th><th class="num">Valor</th><th class="num">Conversão</th></tr></thead>
      <tbody>${data.map(d=>`<tr>
        <td><span class="pie-dot" style="background:${d.color};display:inline-block;margin-right:7px"></span>${escapeHTML(d.label)}</td>
        <td class="num">${d.leads}</td>
        <td class="num">${money(d.valor)}</td>
        <td class="num">${conversionLabel(d.leads,total)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  function renderOriginPie(data){
    const total = data.reduce((s,d)=>s+d.leads,0);
    if(!total) return `<div class="empty">Nenhuma origem encontrada no período.</div>`;
    let cursor = 0;
    const segments = data.map(d => {
      const start = cursor;
      const end = cursor + (d.leads / total) * 100;
      cursor = end;
      return `${d.color} ${start.toFixed(2)}% ${end.toFixed(2)}%`;
    }).join(',');
    return `<div class="pie-layout">
      <div class="pie-visual" style="background:conic-gradient(${segments})" aria-label="Gráfico de pizza por origem"></div>
      <div class="pie-legend">
        ${data.map(d=>`<div class="pie-legend-row">
          <span class="pie-dot" style="background:${d.color}"></span>
          <span class="pie-name">${escapeHTML(d.label)}</span>
          <span class="pie-number">${d.leads} · ${money(d.valor)}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }

  function renderOriginHorizontal(data){
    const max = Math.max(...data.map(d=>d.leads),1);
    return `<div class="funnel-horizontal">
      ${data.map(d=>`<div class="funnel-row">
        <div class="funnel-label">${escapeHTML(d.label)}</div>
        <div class="funnel-track"><div class="funnel-fill" style="width:${Math.max((d.leads/max)*100,2)}%;background:${d.color}"></div></div>
        <div class="funnel-value">${d.leads}</div>
      </div>`).join('')}
    </div>`;
  }

  function renderChartBody(key, data){
    const mode = state.chartModes[key] || 'horizontal';
    if(mode === 'hidden') return `<div class="chart-muted">Gráfico oculto. Use os ícones acima para exibir novamente.</div>`;
    if(key === 'origem'){
      if(mode === 'pie') return renderOriginPie(data);
      if(mode === 'vertical') return renderStageVertical(data.map(d=>({label:d.label,leads:d.leads,valor:d.valor,color:d.color})));
      if(mode === 'list') return `<div class="composition-list"><table><thead><tr><th>Origem</th><th class="num">Leads</th><th class="num">Receita potencial</th></tr></thead><tbody>${data.map(d=>`<tr><td><span class="pie-dot" style="background:${d.color};display:inline-block;margin-right:7px"></span>${escapeHTML(d.label)}</td><td class="num">${d.leads}</td><td class="num">${money(d.valor)}</td></tr>`).join('')}</tbody></table></div>`;
      return renderOriginHorizontal(data);
    }
    if(mode === 'vertical') return renderStageVertical(data);
    if(mode === 'list') return renderStageList(data);
    return renderStageHorizontal(data);
  }

  function saveCadastro(entity, record){
    const nome = formValue('nome');
    if(!nome){ toast('Informe o nome.'); $('#nome').focus(); return; }
    const email = formValue('email');
    if(email && !validateEmail(email)){ toast('Informe um email válido.'); $('#email').focus(); return; }
    if((entity === 'clientes' || entity === 'profissionais') && email){
      const duplicated = DB[entity].find(x => x.id !== (record && record.id) && normalizeText(x.email||'') === normalizeText(email));
      if(duplicated){ toast('Já existe um registro com este email.'); return; }
    }
    const before = record ? Object.assign({}, record) : null;
    let payload = {id: record?.id || uid(entity.slice(0,3)), nome, status: formValue('status') || 'ativo'};
    if(entity === 'clientes') Object.assign(payload, {documento:formValue('documento'), email, telefone:formValue('telefone'), observacoes:formValue('observacoes')});
    if(entity === 'servicos') Object.assign(payload, {categoria:formValue('categoria'), valor:numberValue('valor'), descricao:formValue('descricao')});
    if(entity === 'profissionais') Object.assign(payload, {funcao:formValue('funcao'), email, telefone:formValue('telefone'), custoHora:numberValue('custoHora')});
    payload = meta(Object.assign({}, record || {}, payload), !record);
    if(record){
      const idx = DB[entity].findIndex(x=>x.id===record.id);
      DB[entity][idx] = payload;
      audit(entity,'update',before,payload);
    }else{
      DB[entity].unshift(payload);
      audit(entity,'create',null,payload);
    }
    saveDB();
    closeModal();
    toast('Registro salvo.');
    render();
  }

  function deleteWithRelations(entity, id){
    const record = byId(DB[entity], id);
    if(!record) return;
    const hasRelation = entity === 'clientes' ? DB.vendas.some(v=>v.clienteId===id) || DB.contas.some(c=>String(c.descricao||'').includes(record.nome)) :
                        entity === 'servicos' ? DB.vendas.some(v=>v.servicoId===id) :
                        DB.vendas.some(v=>v.profissionalId===id);
    if(hasRelation){
      confirmAction('Registro com vínculo', 'Este registro possui vínculos. Para preservar histórico, ele será inativado em vez de excluído.', 'Inativar', (reason)=>{
        const before = Object.assign({}, record);
        record.status = 'inativo';
        record.atualizadoEm = todayISO();
        record.atualizadoPor = CURRENT_USER;
        audit(entity,'deactivate',before,record,reason);
        saveDB();
        toast('Registro inativado.');
        render();
      }, true);
    }else{
      deleteEntity(entity,id, entity==='clientes'?'cliente':entity==='servicos'?'serviço':'profissional');
    }
  }

  function deleteVenda(id){
    const venda = byId(DB.vendas, id);
    if(!venda) return;
    const conta = DB.contas.find(c=>c.vendaId===id);
    if(conta && conta.status === 'pago'){
      toast('Não é possível excluir venda com recebimento já baixado.');
      return;
    }
    confirmAction('Excluir venda', conta ? 'A venda possui conta a receber aberta. Ela também será removida.' : 'Excluir esta venda?', 'Excluir', (reason)=>{
      if(conta){

    }
  }

  function saveSupaConfig(){
    const cfg = {
      url: ($('#supaUrl')?.value || '').trim().replace(/\/+$/,''),
      anonKey: ($('#supaKey')?.value || '').trim(),
      table: ($('#supaTable')?.value || 'fxl_backups').trim(),
      recordId: ($('#supaRecord')?.value || 'fxl-operacional').trim()
    };
    if(!cfg.url || !cfg.anonKey || !cfg.table || !cfg.recordId){
      toast('Preencha URL, anon key, tabela e ID do registro.');
      setSupaStatus('Configuração incompleta. Preencha todos os campos.', 'bad');
      return null;
    }
    localStorage.setItem(SUPA_KEY, JSON.stringify(cfg));
    toast('Configuração Supa salva no navegador.');
    setSupaStatus('Configuração salva localmente. Pronto para sincronizar.', 'ok');
    return cfg;
  }

  async function supaRequest(method, payload){
    const cfg = getSupaConfig();
    if(!cfg.url || !cfg.anonKey || !cfg.table || !cfg.recordId){
      setSupaStatus('Configure a conexão Supa antes de sincronizar.', 'bad');
      throw new Error('Configuração Supa incompleta.');
    }

    const endpoint = `${cfg.url}/rest/v1/${encodeURIComponent(cfg.table)}?id=eq.${encodeURIComponent(cfg.recordId)}`;
    const headers = {
      apikey: cfg.anonKey,
      Authorization: `Bearer ${cfg.anonKey}`,
      'Content-Type': 'application/json',
      Prefer: method === 'GET' ? '' : 'resolution=merge-duplicates,return=representation'
    };

    if(method === 'GET'){
      const res = await fetch(endpoint + '&select=id,payload,updated_at', {headers});
      if(!res.ok) throw new Error(`Falha ao ler Supa (${res.status}).`);
      return res.json();
    }

    const res = await fetch(`${cfg.url}/rest/v1/${encodeURIComponent(cfg.table)}`, {
      method:'POST',
      headers,
      body: JSON.stringify({
        id: cfg.recordId,
        payload,
        updated_at: new Date().toISOString()
      })
    });
    if(!res.ok) throw new Error(`Falha ao salvar Supa (${res.status}).`);
    return res.json();
  }

  async function syncToSupa(){
    try{
      const cfg = saveSupaConfig();
      if(!cfg) return;
      setSupaStatus('Enviando dados para Supa...', 'warn');
      await supaRequest('POST', DB);
      audit('sistema','supa_sync_upload','backup',{reason:'Backup enviado para Supa'});
      saveDB();
      setSupaStatus(`Dados enviados para Supa em ${new Date().toLocaleString('pt-BR')}.`, 'ok');
      toast('Backup enviado para Supa.');
    }catch(err){
      console.error(err);
      setSupaStatus(err.message || 'Erro ao enviar para Supa.', 'bad');
      toast('Erro ao enviar para Supa.');
    }
  }

  async function syncFromSupa(){
    try{
      saveSupaConfig();
      setSupaStatus('Buscando dados na Supa...', 'warn');
      const rows = await supaRequest('GET');
      if(!rows || !rows[0] || !rows[0].payload){
        setSupaStatus('Nenhum backup encontrado na Supa para este ID.', 'bad');
        toast('Nenhum backup encontrado.');
        return;
      }
      confirmAction('Importar da Supa', 'Isso substituirá a base local atual pelo backup salvo na Supa.', 'Importar', ()=>{
        DB = normalizeDB(rows[0].payload);
        audit('sistema','supa_sync_download','backup',{reason:'Backup importado da Supa'});
        saveDB();
        setSupaStatus(`Dados importados da Supa em ${new Date().toLocaleString('pt-BR')}.`, 'ok');
        toast('Backup importado da Supa.');
        render();
      });
    }catch(err){
      console.error(err);
      setSupaStatus(err.message || 'Erro ao buscar na Supa.', 'bad');
      toast('Erro ao buscar na Supa.');
    }
  }

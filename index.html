      </div>

      <section class="panel">
        <h3>Memória Supa opcional</h3>
        <p class="note">Use esta área quando publicar o HTML no Git e quiser sincronizar o backup em uma tabela Supa. O sistema continua funcionando localmente se esses campos ficarem vazios.</p>
        <div class="row2">
          <div class="fld"><label for="supaUrl">URL do projeto Supa</label><input id="supaUrl" type="url" placeholder="https://seu-projeto.supabase.co" value="${escapeHTML(supa.url || '')}"></div>
          <div class="fld"><label for="supaKey">Anon key pública</label><input id="supaKey" type="password" autocomplete="off" placeholder="eyJ..." value="${escapeHTML(supa.anonKey || '')}"></div>
        </div>
        <div class="row2">
          <div class="fld"><label for="supaTable">Tabela</label><input id="supaTable" type="text" value="${escapeHTML(supa.table || 'fxl_backups')}"></div>
          <div class="fld"><label for="supaRecord">ID do backup</label><input id="supaRecord" type="text" value="${escapeHTML(supa.recordId || 'fxl-operacional')}"></div>
        </div>
        <div class="toolbar">
          <div class="tool-left">
            <button class="btn ghost" id="saveSupa" type="button">Salvar configuração</button>
            <button class="btn teal" id="syncToSupa" type="button">Enviar para Supa</button>
            <button class="btn ghost" id="syncFromSupa" type="button">Puxar da Supa</button>
          </div>
        </div>
        <div class="sync-status" id="supaStatus">Modo local ativo. Configure a Supa somente quando quiser sincronizar dados fora do navegador.</div>
      </section>

      <section class="panel">
        <div class="panel-head"><h3>Auditoria local recente</h3><button class="btn sm ghost" id="clearAudit" type="button">Limpar auditoria</button></div>
        <div class="audit-log">
          ${auditRows.length ? auditRows.map(a=>`
            <div class="row"><b>${escapeHTML(a.action)}</b> · ${escapeHTML(a.entity)} · ${new Date(a.createdAt).toLocaleString('pt-BR')}<br><small>${escapeHTML(a.reason || 'Sem motivo informado')}</small></div>
          `).join('') : `<div class="row">Nenhum registro de auditoria ainda.</div>`}
        </div>
      </section>
    `;
    bindGlobalActions();
    $('#exportJSON').onclick = exportJSON;
    $('#importJSON').onclick = importJSON;
    $('#saveSupa').onclick = saveSupaConfig;
    $('#syncToSupa').onclick = syncToSupa;
    $('#syncFromSupa').onclick = syncFromSupa;
    $('#clearAudit').onclick = () => confirmAction('Limpar auditoria', 'Deseja limpar a auditoria local?', 'Limpar', ()=>{
      DB.audit = [];
      saveDB();
      toast('Auditoria limpa.');
      render();
    });
  }

  function bindGlobalActions(){
    $$('[data-route-go]').forEach(btn => btn.onclick = () => setRoute(btn.dataset.routeGo));
    $$('[data-new]').forEach(btn => btn.onclick = () => {
      const type = btn.dataset.new;
      if(type === 'oportunidade') modalOportunidade();
      if(type === 'venda') modalVenda();
      if(type === 'conta-receber') modalConta(null,'receber');
      if(type === 'conta-pagar') modalConta(null,'pagar');
      if(type === 'cliente') modalCadastro('clientes');
      if(type === 'serviço' || type === 'servico') modalCadastro('servicos');
      if(type === 'profissional') modalCadastro('profissionais');
    });
    $$('[data-export-csv]').forEach(btn => btn.onclick = () => exportCSV(btn.dataset.exportCsv));
  }

  function render(){
    if(state.route === 'dashboard') renderDashboard();
    if(state.route === 'kanban') renderKanban();
    if(state.route === 'comercial') renderCommercialDashboard();
    if(state.route === 'financeiro') renderFinanceiro();
    if(state.route === 'vendas') renderVendas();
    if(state.route === 'clientes') renderCadastro('clientes','Clientes','Banco de dados simples de clientes.');
    if(state.route === 'servicos') renderCadastro('servicos','Serviços','Catálogo de serviços e valores padrão.');
    if(state.route === 'profissionais') renderCadastro('profissionais','Profissionais','Colaboradores e responsáveis operacionais.');
    if(state.route === 'arquivos') renderArquivos();
  }

  function download(filename, content, type){
    const blob = new Blob([content], {type});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function exportJSON(){
    download(`fxl-backup-${todayISO()}.json`, JSON.stringify(DB, null, 2), 'application/json;charset=utf-8');
    toast('Backup JSON exportado.');
  }

  function importJSON(){
    const file = $('#importFile').files[0];
    if(!file){ toast('Selecione um arquivo JSON.'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        const normalized = normalizeDB(parsed);
        confirmAction('Importar backup', 'A base local atual será substituída pelo arquivo selecionado.', 'Importar', ()=>{
          DB = normalized;
          audit('sistema','import',null,{file:file.name},'Importação de backup JSON');
          saveDB();
          toast('Backup importado.');
          setRoute('dashboard');
        });
      }catch(err){
        toast('Arquivo inválido.');
      }
    };
    reader.readAsText(file);
  }

  function exportCSV(entity){
    const rows = DB[entity] || [];
    if(!rows.length){ toast('Não há registros para exportar.'); return; }
    const keys = Array.from(rows.reduce((set,row)=>{
      Object.keys(row).forEach(k => {
        if(typeof row[k] !== 'object') set.add(k);
      });
      return set;
    }, new Set()));
    const csv = [
      keys.join(';'),
      ...rows.map(row => keys.map(k => `"${String(row[k] ?? '').replace(/"/g,'""')}"`).join(';'))
    ].join('\n');
    download(`fxl-${entity}-${todayISO()}.csv`, '\ufeff'+csv, 'text/csv;charset=utf-8');
    toast('CSV exportado.');
  }

  function init(){
    $('#todayLabel').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    $$('.nav').forEach(btn => btn.onclick = () => { setRoute(btn.dataset.route); closeMobileNav(); });
    $('#btnMobileMenu').onclick = () => document.body.classList.contains('nav-open') ? closeMobileNav() : openMobileNav();
    $('#btnCloseModal').onclick = closeModal;
    $('#scrim').onclick = () => { closeModal(); closeMobileNav(); };
    document.addEventListener('keydown', ev => { if(ev.key === 'Escape'){ closeModal(); closeMobileNav(); } });
    window.addEventListener('resize', () => { if(window.innerWidth > 900) closeMobileNav(); });
    $('#btnCollapse').onclick = () => {
      $('#app').classList.toggle('is-collapsed');
      const collapsed = $('#app').classList.contains('is-collapsed');
      localStorage.setItem(PREF_KEY, JSON.stringify({collapsed}));
    };
    try{
      const pref = JSON.parse(localStorage.getItem(PREF_KEY) || '{}');
      if(pref.collapsed) $('#app').classList.add('is-collapsed');
    }catch(_){}
    $('#btnSeed').onclick = () => confirmAction('Restaurar dados exemplo', 'Isso substituirá a base local por dados de exemplo.', 'Restaurar', ()=>{
      DB = seed();
      saveDB();
      toast('Dados de exemplo restaurados.');
      setRoute('dashboard');
    });
    render();
  }

  init();
})();
</script>
</body>
</html>

<style>
:root{
  --ink:#1d211d; --ink-2:#3a423a; --paper:#f4f1e9; --surface:#fbf9f3; --line:#e2ddcf;
  --teal:#14776b; --teal-d:#0d5249; --teal-l:#e4f0ec;
  --amber:#b5710f; --amber-l:#f7eccf; --red:#a8332b; --red-l:#f6e1de; --green:#3f6d11; --green-l:#e8f0d9;
  --r-sm:8px; --r:10px; --shadow:0 1px 2px rgba(29,33,29,.06),0 6px 20px rgba(29,33,29,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Archivo',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;letter-spacing:-.01em;line-height:1.15}
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.side{background:var(--ink);color:#cbd0c8;padding:22px 14px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{font-family:'Fraunces',serif;font-size:21px;color:#fff;font-weight:600;padding:0 8px 4px;letter-spacing:-.02em}
.brand small{display:block;font-family:'Archivo';font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7d877c;font-weight:500;margin-top:2px}
.navgrp{margin-top:20px}.navgrp>span{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#6c766b;padding:0 8px;display:block;margin-bottom:6px}
.nav{display:block;width:100%;text-align:left;background:none;border:0;color:#cbd0c8;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:13.5px;font-family:inherit;margin-bottom:1px;transition:.12s}
.nav:hover{background:#2a302a;color:#fff}.nav.active{background:var(--teal);color:#fff;font-weight:500}
.reset{margin-top:24px;width:100%;font-size:11px;padding:7px;border-radius:var(--r-sm);background:#2a302a;color:#cbd0c8;border:1px solid #3a423a;cursor:pointer}
.main{padding:30px 38px;max-width:1280px;width:100%}
.topline{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:16px;gap:16px}
.topline h1{font-size:28px}.topline p{color:var(--ink-2);font-size:13px;margin-top:3px}.user{font-size:12px;color:var(--ink-2);text-align:right}.user b{color:var(--ink);font-weight:600;display:block}
.grid{display:grid;gap:16px}.metrics{grid-template-columns:repeat(4,1fr);margin-bottom:22px}.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.metric .lab{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}.metric .val{font-family:'JetBrains Mono';font-size:22px;font-weight:500;margin-top:6px}.metric .sub{font-size:12px;color:var(--ink-2);margin-top:2px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:16px}.panel h3{font-family:'Archivo';font-size:14px;font-weight:600;margin-bottom:10px}
.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.toolbar{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.kb{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:start}.col{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:10px;min-height:120px}.col.over{outline:2px dashed var(--teal);outline-offset:-2px;background:var(--teal-l)}
.col h3{font-family:'Archivo';font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);font-weight:600;display:flex;justify-content:space-between;margin-bottom:10px}.col h3 span{background:var(--ink);color:#fff;border-radius:20px;font-size:10px;padding:1px 7px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px;margin-bottom:8px;cursor:grab;box-shadow:0 1px 1px rgba(0,0,0,.03)}.kcard:active{cursor:grabbing}.kcard .nm{font-weight:600;font-size:13px}.kcard .em{font-size:12px;color:var(--ink-2)}.kcard .vl{font-family:'JetBrains Mono';font-size:13px;color:var(--teal-d);font-weight:500;margin-top:5px}.kcard .meta{font-size:10.5px;color:var(--ink-2);margin-top:5px;display:flex;justify-content:space-between;gap:8px}.movebtn{display:none;margin-top:8px}
.table-scroll{overflow-x:auto}table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);min-width:760px}
th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);font-weight:600;padding:11px 14px;border-bottom:1px solid var(--line);background:#f0ece0;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}tr:last-child td{border-bottom:0}td.num,th.num{text-align:right;font-family:'JetBrains Mono'}
.bdg{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}.b-prev{background:var(--amber-l);color:var(--amber)}.b-ok{background:var(--green-l);color:var(--green)}.b-bad{background:var(--red-l);color:var(--red)}.b-neu{background:#e8e4d7;color:var(--ink-2)}
.btn{font-family:inherit;font-size:13px;font-weight:500;padding:9px 16px;border-radius:var(--r-sm);border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer;transition:.12s}.btn:hover{opacity:.9}.btn:disabled{opacity:.4;cursor:not-allowed}.btn.ghost{background:none;color:var(--ink)}.btn.teal{background:var(--teal);border-color:var(--teal)}.btn.red{background:var(--red);border-color:var(--red)}.btn.sm{padding:5px 10px;font-size:12px}
.fld{margin-bottom:12px}.fld label{display:block;font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:5px}.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r-sm);font-family:inherit;font-size:13.5px;background:#fff;color:var(--ink)}.fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--teal-l);border-color:var(--teal)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.scrim{position:fixed;inset:0;background:rgba(20,24,20,.55);display:none;z-index:50}.scrim.on{display:block}.modal{position:fixed;inset:3vh 4vw;background:var(--paper);z-index:51;display:none;flex-direction:column;border-radius:var(--r);box-shadow:0 12px 60px rgba(0,0,0,.25);overflow:hidden}.modal.full{inset:0;border-radius:0}.modal.on{display:flex}.mhead{padding:18px 28px;border-bottom:1px solid var(--line);background:var(--surface);display:flex;justify-content:space-between;align-items:center}.mhead h2{font-size:20px}.mhead .x{background:none;border:0;font-size:24px;cursor:pointer;color:var(--ink-2)}.steps{display:flex;gap:6px;padding:14px 28px;background:var(--surface);border-bottom:1px solid var(--line)}.stp{flex:1;font-size:11px;text-align:center;padding-bottom:8px;border-bottom:3px solid var(--line);color:var(--ink-2)}.stp.done{border-color:var(--green);color:var(--green)}.stp.cur{border-color:var(--teal);color:var(--teal);font-weight:600}.mbody{flex:1;overflow:auto;padding:24px 28px;max-width:980px;width:100%;margin:0 auto}.mfoot{padding:14px 28px;border-top:1px solid var(--line);background:var(--surface);display:flex;justify-content:space-between;align-items:center;gap:12px}.mini{font-size:12px;color:var(--ink-2)}.note{background:var(--teal-l);border-left:3px solid var(--teal);padding:11px 14px;border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:12.5px;color:var(--teal-d);margin:12px 0}.empty{color:var(--ink-2);font-style:italic;padding:18px;text-align:center}.addrow{background:none;border:1px dashed var(--line);border-radius:var(--r-sm);padding:8px;width:100%;cursor:pointer;color:var(--teal-d);font-family:inherit;font-size:12.5px;margin-top:6px}
.toast{position:fixed;right:18px;bottom:18px;z-index:90;display:grid;gap:8px}.toast div{background:var(--ink);color:#fff;padding:10px 13px;border-radius:var(--r-sm);box-shadow:var(--shadow);font-size:13px}
.bars{display:grid;gap:9px}.bar{background:#e8e4d7;border-radius:20px;overflow:hidden;height:10px}.bar i{display:block;height:10px;background:var(--teal);width:0}.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:1100px){.kb{grid-template-columns:repeat(3,1fr)}.filters,.row4{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.main{padding:20px}.kb{grid-template-columns:1fr}.filters,.row2,.row3,.row4,.split{grid-template-columns:1fr}.modal{inset:0;border-radius:0}.steps{overflow:auto}.movebtn{display:inline-block}}
@media(hover:none){.movebtn{display:inline-block}}

/* ---------- DESIGN REFRESH — mantém paleta original ---------- */
:root{
  --sidebar-w:264px;
  --r-lg:18px;
  --r-xl:24px;
  --gap:18px;
  --shadow-soft:0 1px 2px rgba(29,33,29,.05),0 14px 40px rgba(29,33,29,.07);
  --shadow-lift:0 10px 32px rgba(29,33,29,.11);
}
body{
  background:
    radial-gradient(circle at top left, rgba(20,119,107,.08), transparent 32rem),
    linear-gradient(135deg,#f8f5ec 0%,var(--paper) 52%,#efe9db 100%);
}
.app{grid-template-columns:var(--sidebar-w) minmax(0,1fr)}
.side{
  padding:24px 16px;
  background:
    linear-gradient(180deg,#1d211d 0%,#171b17 100%);
  border-right:1px solid rgba(255,255,255,.06);
}
.brand{
  font-size:26px;
  padding:6px 10px 18px;
  margin-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.brand small{font-size:10px;color:#9ba49a}
.navgrp{margin-top:22px}
.navgrp>span{padding:0 10px;color:#879187;margin-bottom:8px}
.nav{
  padding:10px 12px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.nav:hover{transform:translateX(2px);background:rgba(255,255,255,.07)}
.nav.active{
  background:linear-gradient(135deg,var(--teal),var(--teal-d));
  box-shadow:0 8px 18px rgba(20,119,107,.24);
}
.reset{border-radius:12px;margin-top:28px}
.main{
  max-width:1500px;
  padding:34px 42px 48px;
}
.topline{
  align-items:center;
  padding:0 0 22px;
  border-bottom:0;
  margin-bottom:24px;
}
.topline h1{font-size:34px}
.topline p{font-size:14px;max-width:720px}
.user{
  background:rgba(251,249,243,.78);
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px 14px;
  box-shadow:var(--shadow);
}
.metrics{
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:18px;
}
.metric,.panel{
  border-radius:var(--r-lg);
  background:rgba(251,249,243,.88);
  backdrop-filter:blur(10px);
  box-shadow:var(--shadow-soft);
}
.metric{
  min-height:128px;
  padding:19px 20px;
  position:relative;
  overflow:hidden;
}
.metric:before{
  content:"";
  position:absolute;
  inset:0 auto 0 0;
  width:4px;
  background:linear-gradient(var(--teal),var(--teal-d));
  opacity:.9;
}
.metric .lab{font-size:10.5px;color:#5c665b}
.metric .val{font-size:25px;letter-spacing:-.03em}
.metric .sub{margin-top:7px}
.panel{
  padding:20px;
  margin-bottom:18px;
}
.panel h3{font-size:15px;margin-bottom:14px}
.filters,.toolbar,.toolb{
  background:rgba(251,249,243,.65);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  padding:12px;
  box-shadow:0 1px 1px rgba(29,33,29,.03);
}
.toolbar,.toolb{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px}
.filters{gap:12px;margin-bottom:16px}
.fld{margin-bottom:13px}
.fld label{
  font-size:11px;
  letter-spacing:.02em;
  color:#556055;
}
.fld input,.fld select,.fld textarea,
.filters input,.filters select,.toolbar input,.toolbar select,.toolb input,.toolb select{
  border-radius:12px;
  border-color:#d9d2c2;
  background:#fffefb;
  min-height:40px;
  transition:border-color .15s,box-shadow .15s,background .15s;
}
.fld textarea{min-height:92px;resize:vertical}
.fld input:focus,.fld select:focus,.fld textarea:focus,
.filters input:focus,.filters select:focus,.toolbar input:focus,.toolbar select:focus,.toolb input:focus,.toolb select:focus{
  outline:0;
  border-color:var(--teal);
  box-shadow:0 0 0 4px rgba(20,119,107,.12);
  background:#fff;
}
.btn{
  border-radius:12px;
  min-height:38px;
  box-shadow:0 1px 1px rgba(29,33,29,.04);
}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(29,33,29,.10)}
.btn.ghost:hover{background:#fff}
.btn.teal{background:linear-gradient(135deg,var(--teal),var(--teal-d))}
.btn.sm{min-height:30px;border-radius:10px}
.addrow{
  border-radius:14px;
  border-color:#cfc7b7;
  background:rgba(255,255,255,.42);
}
.addrow:hover{background:var(--teal-l);border-color:var(--teal)}
.kb{
  grid-template-columns:repeat(6,minmax(190px,1fr));
  gap:14px;
  overflow-x:auto;
  padding-bottom:12px;
}
.col{
  border-radius:var(--r-lg);
  padding:12px;
  min-height:360px;
  background:rgba(251,249,243,.88);
  box-shadow:var(--shadow);
}
.col h3{
  position:sticky;
  top:0;
  z-index:1;
  background:rgba(251,249,243,.96);
  padding:3px 2px 10px;
}
.col.over{background:#eef7f3;box-shadow:0 0 0 2px var(--teal) inset}
.kcard{
  border-radius:15px;
  padding:13px;
  margin-bottom:10px;
  background:linear-gradient(180deg,#fff 0%,#fffdfa 100%);
  box-shadow:0 1px 1px rgba(29,33,29,.04),0 8px 18px rgba(29,33,29,.05);
  transition:transform .14s,box-shadow .14s,border-color .14s;
}
.kcard:hover{
  transform:translateY(-2px);
  border-color:#c8bfad;
  box-shadow:var(--shadow-lift);
}
.kcard .nm{font-size:14px}
.kcard .vl{font-size:14px;margin-top:8px}
.kcard .meta{border-top:1px solid #eee8dc;padding-top:8px;margin-top:8px}
.table-scroll{
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-soft);
  border:1px solid var(--line);
  overflow:auto;
  background:var(--surface);
}
.table-scroll table{box-shadow:none;border:0;border-radius:0}
table{
  border-radius:var(--r-lg);
  overflow:hidden;
  box-shadow:var(--shadow-soft);
}
th{
  padding:13px 14px;
  background:linear-gradient(180deg,#f2eee4,#ebe4d5);
  white-space:nowrap;
}
td{padding:12px 14px;vertical-align:middle}
tbody tr:hover td{background:rgba(228,240,236,.34)}
.bdg{
  border-radius:999px;
  padding:4px 10px;
  font-size:10.5px;
  letter-spacing:.01em;
  white-space:nowrap;
}
.modal{
  inset:2vh 3vw;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.45);
  box-shadow:0 20px 90px rgba(0,0,0,.32);
}
.modal.full{border-radius:0}
.mhead{
  padding:20px 30px;
  background:linear-gradient(180deg,#fffdf7,var(--surface));
}
.mhead h2{font-size:24px}
.mhead .x{
  width:38px;height:38px;border-radius:50%;
  display:grid;place-items:center;
}
.mhead .x:hover{background:#eee8dc;color:var(--ink)}
.steps{
  gap:8px;
  padding:15px 30px;
}
.stp{
  border-bottom-width:4px;
  border-radius:8px 8px 0 0;
}
.mbody{
  max-width:1120px;
  padding:30px;
}
.mfoot{
  padding:16px 30px;
}
.note{
  border-radius:14px;
  border-left-width:4px;
  padding:13px 15px;
}
.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:0 0 16px;
  padding:6px;
  background:rgba(251,249,243,.72);
  border:1px solid var(--line);
  border-radius:16px;
}
.tab{
  border:0;
  background:transparent;
  color:var(--ink-2);
  border-radius:12px;
  padding:9px 13px;
  font-family:inherit;
  font-weight:600;
  cursor:pointer;
}
.tab:hover{background:#fff}
.tab.active,.tab.on{
  background:var(--ink);
  color:#fff;
}
.split{
  gap:18px;
}
.health{
  border-radius:var(--r-lg);
  padding:17px 18px;
  box-shadow:var(--shadow);
}
.health .big{font-size:28px}
.toast{right:22px;bottom:22px}
.toast div{
  border-radius:14px;
  padding:12px 15px;
  box-shadow:0 14px 40px rgba(29,33,29,.18);
}
.bars .bar{height:12px;background:#ded7c8}
.bars .bar i{height:12px;border-radius:20px}
.empty{
  border:1px dashed var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.34);
}
@media(max-width:1280px){
  .kb{grid-template-columns:repeat(3,minmax(220px,1fr))}
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .side{
    position:static;
    height:auto;
    border-right:0;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .navgrp{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .navgrp>span{grid-column:1/-1}
  .main{padding:24px}
  .topline{align-items:flex-start;flex-direction:column}
  .user{text-align:left}
}
@media(max-width:760px){
  .main{padding:18px}
  .topline h1{font-size:28px}
  .metrics{grid-template-columns:1fr}
  .kb{grid-template-columns:1fr;overflow:visible}
  .col{min-height:auto}
  .filters,.toolbar,.toolb{padding:10px}
  .mhead,.steps,.mbody,.mfoot{padding-left:18px;padding-right:18px}
  .steps{overflow-x:auto}
  .stp{min-width:120px}
}


/* ==========================================================================
   DESIGN REFRESH v2 — inspirado nas referências SaaS/CRM enviadas
   Apenas camada visual: não altera HTML estrutural nem JavaScript.
   ========================================================================== */
:root{
  --paper:#f6f7f9;
  --surface:#ffffff;
  --surface-2:#fbfcfd;
  --line:#d9dee8;
  --ink:#171b24;
  --ink-2:#6a7487;
  --teal:#14776b;
  --teal-d:#07584f;
  --teal-l:#e9f5f2;
  --amber:#f29b2e;
  --amber-l:#fff3dc;
  --red:#e24a42;
  --red-l:#fff0ef;
  --green:#42aa5b;
  --green-l:#eaf8ef;
  --blue:#2f6fe8;
  --blue-l:#ecf4ff;
  --purple:#7463f0;
  --purple-l:#f0efff;
  --orange:#f06d35;
  --orange-l:#fff1e8;
  --cyan:#43b8cf;
  --cyan-l:#e9fbff;
  --r-xs:8px;
  --r-sm:10px;
  --r:14px;
  --r-lg:18px;
  --shadow-soft:0 1px 2px rgba(16,24,40,.06),0 10px 26px rgba(16,24,40,.07);
  --shadow-card:0 2px 10px rgba(16,24,40,.08),0 16px 34px rgba(16,24,40,.05);
  --sidebar-w:252px;
}
*{scrollbar-width:thin;scrollbar-color:#c5ccd8 transparent}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c5ccd8;border-radius:999px;border:3px solid transparent;background-clip:content-box}
html{background:var(--paper)}
body{
  background:
    radial-gradient(circle at 70% -5%, rgba(20,119,107,.10), transparent 30%),
    linear-gradient(180deg,#fafafa 0%,var(--paper) 250px);
  color:var(--ink);
}
h1,h2,h3{font-family:'Archivo',sans-serif;font-weight:700;letter-spacing:-.035em}
.app{grid-template-columns:var(--sidebar-w) minmax(0,1fr);background:transparent}
.side{
  background:
    radial-gradient(circle at 70% -20%, rgba(20,119,107,.35), transparent 32%),
    linear-gradient(180deg,#10221e 0%,#071613 100%);
  color:rgba(255,255,255,.78);
  padding:24px 14px;
  border-right:1px solid rgba(255,255,255,.08);
  box-shadow:inset -1px 0 rgba(255,255,255,.04);
}
.brand{
  font-family:'Fraunces',serif;
  font-size:34px;
  line-height:.88;
  color:#fff;
  letter-spacing:-.06em;
  padding:0 10px 20px;
  margin-bottom:18px;
  border-bottom:1px solid rgba(255,255,255,.12);
}
.brand small{
  font-family:'Archivo',sans-serif;
  font-size:10px;
  letter-spacing:.19em;
  color:rgba(255,255,255,.72);
  margin-top:8px;
}
.navgrp{margin-top:22px}
.navgrp>span{
  color:#7de58f;
  font-size:11px;
  font-weight:800;
  letter-spacing:.08em;
  padding:0 10px;
  margin-bottom:8px;
}
.nav{
  color:rgba(255,255,255,.88);
  border-radius:12px;
  padding:10px 12px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  transition:background .16s ease, transform .16s ease, color .16s ease;
}
.nav:hover{background:rgba(255,255,255,.08);color:#fff;transform:translateX(2px)}
.nav.active{
  background:linear-gradient(135deg,var(--teal),var(--teal-d));
  color:#fff;
  box-shadow:0 10px 24px rgba(20,119,107,.28), inset 0 1px rgba(255,255,255,.18);
}
.nav.reset{
  margin-top:14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);
}
.main{
  max-width:none;
  width:100%;
  padding:28px 36px 46px;
  min-width:0;
}
.topline{
  padding:0 0 22px;
  margin-bottom:20px;
  border-bottom:1px solid var(--line);
  align-items:center;
  gap:18px;
}
.topline h1{font-size:30px;color:var(--ink);display:flex;align-items:center;gap:8px}
.topline p{font-size:14px;color:var(--ink-2);margin-top:4px}
.user{
  padding:7px 12px;
  border-radius:999px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 1px 2px rgba(16,24,40,.04);
  color:var(--ink-2);
}
.user b{font-weight:700;color:var(--ink)}
.btn{
  border-radius:12px;
  min-height:38px;
  padding:9px 16px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink);
  box-shadow:0 1px 2px rgba(16,24,40,.04);
}
.btn:hover{opacity:1;transform:translateY(-1px);box-shadow:0 8px 18px rgba(16,24,40,.08)}
.btn.teal,.btn:not(.ghost){
  background:linear-gradient(135deg,var(--teal),var(--teal-d));
  border-color:transparent;
  color:#fff;
}
.btn.ghost{
  background:#fff;
  color:var(--ink);
  border-color:var(--line);
}
.btn.sm{min-height:30px;border-radius:10px;padding:5px 10px}
.fld label{font-size:12px;font-weight:700;color:var(--ink-2)}
.fld input,.fld select,.fld textarea,
.filters input,.filters select,.toolbar input,.toolbar select,.toolb input,.toolb select{
  min-height:40px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  box-shadow:0 1px 1px rgba(16,24,40,.025);
  color:var(--ink);
}
.fld input:focus,.fld select:focus,.fld textarea:focus,
.filters input:focus,.filters select:focus,.toolbar input:focus,.toolbar select:focus,.toolb input:focus,.toolb select:focus{
  outline:3px solid rgba(20,119,107,.12);
  border-color:rgba(20,119,107,.55);
}
.filters,.toolbar,.toolb{
  background:transparent;
  border:0;
  box-shadow:none;
  padding:0;
  gap:12px;
  margin-bottom:18px;
}
.filters input:first-child,.toolbar input:first-child,.toolb input:first-child{min-width:280px}
.grid{gap:18px}
.metrics{grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}
.metric,.panel{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-soft);
}
.metric{
  padding:20px 22px;
  min-height:112px;
  position:relative;
  overflow:hidden;
}
.metric:before{
  content:"";
  position:absolute;
  right:-35px;
  top:-35px;
  width:100px;
  height:100px;
  border-radius:50%;
  background:rgba(20,119,107,.08);
}
.metric .lab{font-size:12px;color:var(--ink-2);letter-spacing:.01em;text-transform:none}
.metric .val{font-size:26px;color:var(--ink);letter-spacing:-.03em}
.metric .sub{font-size:13px;color:var(--ink-2)}
.panel{padding:20px}
.table-scroll{
  border-radius:var(--r-lg);
  border:1px solid var(--line);
  box-shadow:var(--shadow-soft);
  background:#fff;
}
table{
  background:#fff;
  border:0;
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-soft);
}
.table-scroll table{border-radius:0;box-shadow:none}
th{
  background:#fbfcfd;
  color:var(--ink-2);
  font-size:11.5px;
  font-weight:800;
  padding:14px 16px;
  border-bottom:1px solid var(--line);
}
td{
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  color:var(--ink);
}
tbody tr:hover td{background:#fbfcfd}
.bdg{
  border-radius:999px;
  padding:4px 10px;
  font-size:11px;
  font-weight:700;
}
.b-prev{background:var(--amber-l);color:#d97706}
.b-ok{background:var(--green-l);color:#249447}
.b-bad{background:var(--red-l);color:#d93025}
.b-neu{background:#eef2f7;color:var(--ink-2)}

/* Tabs semelhantes às referências */
.tabs{
  background:transparent;
  border:0;
  border-bottom:1px solid var(--line);
  border-radius:0;
  padding:0;
  gap:4px;
  margin:0 0 22px;
}
.tab{
  border-radius:0;
  padding:12px 16px;
  color:var(--ink-2);
  font-weight:700;
  border-bottom:2px solid transparent;
}
.tab:hover{background:transparent;color:var(--ink)}
.tab.active,.tab.on{
  background:transparent;
  color:var(--teal-d);
  border-bottom-color:var(--teal);
}

/* Kanban CRM com colunas em pastéis leves */
.kb{
  display:grid;
  grid-template-columns:repeat(6,minmax(250px,1fr));
  gap:14px;
  align-items:stretch;
  overflow-x:auto;
  padding-bottom:14px;
}
.col{
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:0;
  min-height:560px;
  overflow:hidden;
  box-shadow:0 1px 2px rgba(16,24,40,.05);
  position:relative;
}
.col:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,.14));
}
.col h3{
  position:relative;
  z-index:1;
  min-height:100px;
  padding:14px 14px 10px;
  margin:0;
  background:rgba(255,255,255,.72);
  border-bottom:1px solid rgba(217,222,232,.75);
  font-family:'Archivo',sans-serif;
  font-size:13px;
  color:var(--ink);
  letter-spacing:0;
  text-transform:none;
  align-items:flex-start;
}
.col h3:before{
  content:"";
  width:9px;
  height:9px;
  border-radius:50%;
  display:inline-block;
  margin-right:8px;
  transform:translateY(4px);
  flex:0 0 9px;
}
.col h3 span{
  min-width:24px;
  height:24px;
  border-radius:8px;
  display:inline-grid;
  place-items:center;
  padding:0 7px;
  font-size:12px;
  color:#fff;
}
.col .empty{
  position:relative;
  z-index:1;
  margin:16px;
  min-height:170px;
  display:grid;
  place-items:center;
  border-radius:14px;
  border-style:dashed;
  border-width:2px;
  font-style:normal;
  background:rgba(255,255,255,.35);
  color:var(--ink-2);
}
.col.over{outline:0;box-shadow:0 0 0 3px rgba(20,119,107,.16), var(--shadow-card)}
.kcard{
  position:relative;
  z-index:1;
  margin:12px;
  padding:14px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:var(--shadow-card);
  cursor:grab;
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
}
.kcard:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 26px rgba(16,24,40,.12);
  border-color:rgba(20,119,107,.26);
}
.kcard .nm{font-size:14px;font-weight:800;color:var(--ink)}
.kcard .em{font-size:12.5px;color:var(--ink-2);margin-top:3px}
.kcard .vl{font-size:16px;font-weight:800;margin-top:10px}
.kcard .meta{font-size:12px;color:var(--ink-2);margin-top:10px}
.movebtn{
  border-radius:10px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink-2);
}

/* Cores por etapa do Kanban usando ordem atual das colunas */
.col:nth-child(1){background:linear-gradient(180deg,#f1efff 0%,#f7f6ff 100%)}
.col:nth-child(1) h3:before,.col:nth-child(1) h3 span{background:var(--purple)}
.col:nth-child(1) .empty{border-color:rgba(116,99,240,.28);color:#6f65c8}
.col:nth-child(1) .vl{color:var(--purple)}

.col:nth-child(2){background:linear-gradient(180deg,#edf5ff 0%,#f7fbff 100%)}
.col:nth-child(2) h3:before,.col:nth-child(2) h3 span{background:var(--blue)}
.col:nth-child(2) .empty{border-color:rgba(47,111,232,.26);color:#3976d6}
.col:nth-child(2) .vl{color:var(--blue)}

.col:nth-child(3){background:linear-gradient(180deg,#e9fbff 0%,#f7fdff 100%)}
.col:nth-child(3) h3:before,.col:nth-child(3) h3 span{background:var(--cyan)}
.col:nth-child(3) .empty{border-color:rgba(67,184,207,.28);color:#1b97ae}
.col:nth-child(3) .vl{color:#1397ad}

.col:nth-child(4){background:linear-gradient(180deg,#fff7e9 0%,#fffaf1 100%)}
.col:nth-child(4) h3:before,.col:nth-child(4) h3 span{background:var(--amber)}
.col:nth-child(4) .empty{border-color:rgba(242,155,46,.32);color:#c97812}
.col:nth-child(4) .vl{color:#dc7f12}

.col:nth-child(5){background:linear-gradient(180deg,#fff0e8 0%,#fff8f4 100%)}
.col:nth-child(5) h3:before,.col:nth-child(5) h3 span{background:var(--orange)}
.col:nth-child(5) .empty{border-color:rgba(240,109,53,.30);color:#d35f29}
.col:nth-child(5) .vl{color:var(--orange)}

.col:nth-child(6){background:linear-gradient(180deg,#fff0ef 0%,#fff8f7 100%)}
.col:nth-child(6) h3:before,.col:nth-child(6) h3 span{background:var(--red)}
.col:nth-child(6) .empty{border-color:rgba(226,74,66,.30);color:#cc3e38}
.col:nth-child(6) .vl{color:var(--red)}

/* Modais mais limpos, sem mexer na lógica */
.scrim{background:rgba(15,23,42,.54);backdrop-filter:blur(4px)}
.modal{
  inset:3vh 4vw;
  border-radius:22px;
  background:var(--paper);
  box-shadow:0 24px 80px rgba(15,23,42,.34);
  border:1px solid rgba(255,255,255,.72);
  overflow:hidden;
}
.modal.full{inset:0;border-radius:0}
.mhead{
  background:#fff;
  padding:18px 28px;
  border-bottom:1px solid var(--line);
}
.mhead h2{font-size:22px}
.mhead .x{
  border-radius:12px;
  color:var(--ink-2);
}
.mhead .x:hover{background:#f2f4f7;color:var(--ink)}
.steps{
  background:#fff;
  padding:14px 28px;
  border-bottom:1px solid var(--line);
}
.stp{
  border-bottom-width:3px;
  color:var(--ink-2);
  font-weight:700;
}
.stp.done{border-color:var(--green);color:var(--green)}
.stp.cur{border-color:var(--teal);color:var(--teal-d)}
.mbody{padding:28px;max-width:1140px}
.mfoot{background:#fff;padding:16px 28px;border-top:1px solid var(--line)}
.addrow{
  border-radius:12px;
  border:1px dashed rgba(20,119,107,.45);
  background:var(--teal-l);
  color:var(--teal-d);
  font-weight:700;
}
.note{
  background:var(--teal-l);
  color:var(--teal-d);
  border-left:4px solid var(--teal);
  border-radius:14px;
}
.health{
  border-radius:var(--r-lg);
  border:1px solid var(--line);
}
.toast div{background:#111827;color:#fff;border-radius:14px;box-shadow:0 18px 44px rgba(15,23,42,.22)}

@media(max-width:1280px){
  .app{grid-template-columns:220px minmax(0,1fr)}
  .kb{grid-template-columns:repeat(6,minmax(235px,1fr))}
}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .side{height:auto;position:static}
  .brand{font-size:26px;margin-bottom:8px;padding-bottom:12px}
  .navgrp{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:12px}
  .navgrp>span{grid-column:1/-1}
  .main{padding:22px}
  .topline{align-items:flex-start;flex-direction:column}
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:760px){
  .main{padding:16px}
  .topline h1{font-size:25px}
  .metrics{grid-template-columns:1fr}
  .kb{grid-template-columns:repeat(6,minmax(245px,82vw))}
  .col{min-height:480px}
  .filters input:first-child,.toolbar input:first-child,.toolb input:first-child{min-width:100%}
  .modal{inset:0;border-radius:0}
}

/* Acessibilidade, foco e estabilidade visual */
.skip-link{
  position:absolute;
  left:16px;
  top:16px;
  z-index:999;
  transform:translateY(-140%);
  background:#fff;
  color:var(--ink);
  border:2px solid var(--teal);
  border-radius:12px;
  padding:10px 14px;
  box-shadow:var(--shadow-soft);
  transition:transform .16s ease;
}
.skip-link:focus{transform:translateY(0)}
:focus-visible{
  outline:3px solid rgba(20,119,107,.45);
  outline-offset:3px;
}
button,input,select,textarea{font:inherit}
button{touch-action:manipulation}
[hidden]{display:none!important}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important;
    animation-iteration-count:1!important;
    scroll-behavior:auto!important;
    transition-duration:.01ms!important;
  }
  .nav:hover,.btn:hover,.kcard:hover{transform:none}
}
@media(forced-colors:active){
  .btn,.nav,.bdg,.metric,.panel,.col,.kcard{forced-color-adjust:auto}
}



/* Tema final shadcn neutral */
:root {
  --card: #ffffff;
  --ring: #d4d4d8;
  --input: #d4d4d8;
  --muted: #f4f4f5;
  --accent: #f4f4f5;
  --border: #e4e4e7;
  --radius: 0.625rem;
  --chart-1: #ea580c;
  --chart-2: #0d9488;
  --chart-3: #164e63;
  --chart-4: #fbbf24;
  --chart-5: #f59e0b;
  --popover: #ffffff;
  --primary: #18181b;
  --sidebar: #fafafa;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
  --secondary: #f4f4f5;
  --background: #ffffff;
  --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
  --foreground: #0a0a0a;
  --destructive: #ef4444;
  --sidebar-ring: #d4d4d8;
  --sidebar-accent: #f4f4f5;
  --sidebar-border: #e4e4e7;
  --card-foreground: #0a0a0a;
  --sidebar-primary: #18181b;
  --muted-foreground: #71717a;
  --accent-foreground: #18181b;
  --popover-foreground: #0a0a0a;
  --primary-foreground: #fafafa;
  --sidebar-foreground: #0a0a0a;
  --secondary-foreground: #18181b;
  --destructive-foreground: #ef4444;
  --sidebar-accent-foreground: #18181b;
  --sidebar-primary-foreground: #fafafa;

  --ink: var(--foreground);
  --ink-2: var(--muted-foreground);
  --paper: var(--background);
  --surface: var(--card);
  --surface-2: var(--muted);
  --line: var(--border);
  --teal: var(--chart-2);
  --teal-d: #0f766e;
  --teal-l: #ccfbf1;
  --amber: var(--chart-5);
  --amber-l: #fef3c7;
  --red: var(--destructive);
  --red-l: #fee2e2;
  --green: #16a34a;
  --green-l: #dcfce7;
  --blue: #2563eb;
  --blue-l: #dbeafe;
  --purple: #7c3aed;
  --purple-l: #ede9fe;
  --orange: var(--chart-1);
  --orange-l: #ffedd5;
  --cyan: #0891b2;
  --cyan-l: #cffafe;
  --r-xs: var(--radius);
  --r-sm: var(--radius);
  --r: var(--radius);
  --r-lg: calc(var(--radius) + 0.25rem);
  --r-xl: calc(var(--radius) + 0.5rem);
  --shadow-soft: 0 1px 2px rgba(24, 24, 27, .04), 0 12px 28px rgba(24, 24, 27, .06);
  --shadow-card: 0 1px 2px rgba(24, 24, 27, .05), 0 10px 24px rgba(24, 24, 27, .06);
  --shadow: var(--shadow-soft);
  --shadow-lift: 0 14px 34px rgba(24, 24, 27, .10);
}

.dark {

  --ring: #52525b;
  --input: #27272a;
  --muted: #18181b;
  --accent: #18181b;
  --border: #27272a;
  --radius: 0.625rem;
  --chart-1: #1d4ed8;
  --chart-2: #10b981;
  --chart-3: #f59e0b;
  --chart-4: #8b5cf6;
  --chart-5: #f43f5e;

  --primary: #fafafa;

  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
  --secondary: #27272a;
  --background: #0a0a0a;
  --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
  --foreground: #fafafa;
  --destructive: #7f1d1d;
  --sidebar-ring: #52525b;
  --sidebar-accent: #262626;
  --sidebar-border: #27272a;
  --card-foreground: #fafafa;
  --sidebar-primary: #1d4ed8;
  --muted-foreground: #a1a1aa;
  --accent-foreground: #fafafa;
  --popover-foreground: #fafafa;
  --primary-foreground: #18181b;
  --sidebar-foreground: #fafafa;
  --secondary-foreground: #fafafa;
  --destructive-foreground: #ef4444;
  --sidebar-accent-foreground: #fafafa;
  --sidebar-primary-foreground: #fafafa;

  --ink: var(--foreground);
  --ink-2: var(--muted-foreground);
  --paper: var(--background);
  --surface: var(--card);
  --surface-2: var(--muted);
  --line: var(--border);
  --teal: var(--chart-2);
  --teal-d: #059669;
  --teal-l: rgba(16, 185, 129, .16);
  --amber: var(--chart-3);

  --red-l: rgba(239, 68, 68, .16);
  --green: #22c55e;
  --green-l: rgba(34, 197, 94, .16);
  --blue: var(--chart-1);
  --blue-l: rgba(29, 78, 216, .18);
  --purple: var(--chart-4);
  --purple-l: rgba(139, 92, 246, .18);
  --orange: var(--chart-3);
  --orange-l: rgba(245, 158, 11, .18);
  --cyan: #06b6d4;
  --cyan-l: rgba(6, 182, 212, .18);
  --shadow-soft: 0 1px 2px rgba(0, 0, 0, .24), 0 14px 34px rgba(0, 0, 0, .26);
  --shadow-card: 0 1px 2px rgba(0, 0, 0, .28), 0 12px 28px rgba(0, 0, 0, .22);
  --shadow: var(--shadow-soft);
  --shadow-lift: 0 18px 42px rgba(0, 0, 0, .32);
}

@theme inline {
  --color-card: var(--card);
  --color-ring: var(--ring);
  --color-input: var(--input);
  --color-muted: var(--muted);
  --color-accent: var(--accent);

function normalizeDB(){
  DB.recorrencia=DB.recorrencia||[];
  DB.historicoFinanceiro=DB.historicoFinanceiro||[];
  DB.lead=(DB.lead||[]).map(l=>{
    if(!l.produtoServicoId){
      const txt=((l.tags||'')+' '+(l.observacoes||'')+' '+(l.empresa||'')).toLowerCase();
      const match=(DB.produtoServico||[]).find(p=>txt.includes((p.categoria||'').toLowerCase())||txt.includes((p.nome||'').toLowerCase().split(' ')[0]));
      if(match)l.produtoServicoId=match.id;
    }
    return l;
  });
  for(const e of ['contaReceber','contaPagar']){
    (DB[e]||[]).forEach(c=>{
      if(c.valorRecebido==null&&e==='contaReceber')c.valorRecebido=c.status==='recebido'?+c.valor||0:0;
      if(c.valorPago==null&&e==='contaPagar')c.valorPago=c.status==='pago'?+c.valor||0:0;
      if(c.saldo==null)c.saldo=num((+c.valor||0)-(+c.valorRecebido||0)-(+c.valorPago||0));
      if(!c.tipoLancamento)c.tipoLancamento=c.recorrente?'recorrente':((c.parcela||'').includes('/')&&!(c.parcela||'').startsWith('1/1')?'parcelado':'unico');
    });
  }
}

function wireKanban(){const kb=document.getElementById('kb');let dragId=null, counter=new Map();kb.ondragstart=e=>{const card=e.target.closest('.kcard');if(card){dragId=card.dataset.id;e.dataTransfer.effectAllowed='move'}};kb.ondragover=e=>{if(e.target.closest('.col'))e.preventDefault()};kb.ondragenter=e=>{const col=e.target.closest('.col');if(col){counter.set(col,(counter.get(col)||0)+1);col.classList.add('over')}};kb.ondragleave=e=>{const col=e.target.closest('.col');if(col){counter.set(col,(counter.get(col)||1)-1);if(counter.get(col)<=0){col.classList.remove('over');counter.set(col,0)}}};kb.ondrop=e=>{const col=e.target.closest('.col');if(col&&dragId){e.preventDefault();col.classList.remove('over');moveLead(dragId,col.dataset.st)}dragId=null}}

function totalVenda(){return num(W.venda.itens.reduce((s,i)=>s+(+i.quantidade||0)*(+i.valorUnitario||0),0))}
function stepValid(s){const v=W.venda;if(s===0){const condOk=v.condicaoPagamento==='aVista'?+v.numeroParcelas===1:v.condicaoPagamento==='parcelado'?+v.numeroParcelas>=2:+v.numeroParcelas>=1;return !!((v.clienteId||String(v.clienteNovo||'').trim())&&v.vendedorId&&v.itens.some(i=>i.produtoServicoId&&+i.valorUnitario>0)&&totalVenda()>0&&condOk)}if(s===1)return W.parcelas.length>0&&num(W.parcelas.reduce((a,p)=>a+(+p.valor||0),0))===totalVenda();if(s===2)return !!W.projeto.nome.trim();return true}

function applyConta(ent,old,next){
  if(!next.vencimento||next.valor<=0){toast('Informe vencimento e valor maior que zero');return false}
  if((next.status==='recebido'||next.status==='pago')&&next.saldo>0){toast('Para marcar como realizado, o saldo precisa ser zero');return false}
  if(next.status==='previsto'&&next.saldo===0){next.status=ent==='contaReceber'?'recebido':'pago'}
  const arr=DB[ent], ix=arr.findIndex(x=>x.id===next.id);
  if(ix>=0)arr[ix]=next;else arr.push(next);
  if(next.recorrenciaId&&!get('recorrencia',next.recorrenciaId))DB.recorrencia.push({id:next.recorrenciaId,nome:next.descricao||next.documento||next.recorrenciaId,entidade:ent,frequencia:next.frequencia||'mensal',status:'ativa',inicio:next.vencimento});
  syncFluxoConta(ent,next);logFin(ent,next.id,old?'editar':'criar',old,next);return true;
}
function saveConta(ent,id){
  const old=id?clone(get(ent,id)):null,next=readContaForm(ent,id);
  const scope=document.getElementById('ec_scope')?.value||'este';
  if(id&&next.recorrenciaId&&scope!=='este'){
    const oldDate=(old&&old.vencimento)||next.vencimento;
    const serie=DB[ent].filter(x=>x.recorrenciaId===next.recorrenciaId&&(scope==='todos'||x.vencimento>=oldDate));
    for(const item of serie){
      const antes=clone(item);
      item.categoria=next.categoria;item.centroCusto=next.centroCusto;item.observacoes=next.observacoes;item.frequencia=next.frequencia;item.recorrente=true;item.tipoLancamento='recorrente';
      if(scope==='todos'||item.id===id){item.valor=next.valor;item.saldo=num(Math.max(0,next.valor-(ent==='contaReceber'?(item.valorRecebido||0):(item.valorPago||0))))}

  }
  if(applyConta(ent,old,next)){closeModal();render();toast('Lançamento salvo')}
}

 <h3>Histórico de compras</h3>${table(['Venda','Data','Vendedor',{t:'Valor',num:1},'Status','Ações'],vendas.map(v=>`<tr><td>${esc(v.numero||v.id)}</td><td>${esc(v.criadoEm||'—')}</td><td>${nomeVend(v.vendedorId)}</td><td class="num">${money(v.valorTotal)}</td><td>${statusBadge(v.status)}</td><td><button type="button" class="btn ghost sm" onclick="detailVenda('${v.id}')">abrir</button></td></tr>`).join(''))}
 <h3>Projetos</h3>${table(['Projeto','Status',{t:'Receita',num:1},{t:'Margem',num:1},'Ações'],projs.map(p=>{const v=get('venda',p.vendaId)||{};return `<tr><td>${esc(p.nome)}</td><td>${statusBadge(p.status)}</td><td class="num">${money(v.valorTotal)}</td><td class="num">${money(p.margemValor)}</td><td><button type="button" class="btn ghost sm" onclick="editProjeto('${p.id}')">abrir</button></td></tr>`}).join(''))}
 <h3>Financeiro do cliente</h3><div class="split"><div>${table(['Receber','Vencimento',{t:'Saldo',num:1},'Status'],cr.map(x=>`<tr><td>${esc(x.documento||x.parcela)}</td><td>${x.vencimento}</td><td class="num">${money(x.saldo??x.valor)}</td><td>${statusBadge(effectiveStatus(x))}</td></tr>`).join(''))}</div><div>${table(['Pagar','Vencimento',{t:'Saldo',num:1},'Status'],cp.map(x=>`<tr><td>${esc(x.descricao)}</td><td>${x.vencimento}</td><td class="num">${money(x.saldo??x.valor)}</td><td>${statusBadge(effectiveStatus(x))}</td></tr>`).join(''))}</div></div>
 <h3>Timeline</h3>${opHistory('cliente',id)}`,`<button type="button" class="btn ghost" onclick="closeModal()">Fechar</button><button type="button" class="btn teal" onclick="editCad('cliente','${id}')">Editar cadastro</button>`)}
function inputField(ent,obj,fld){const [k,l,t,req]=fld,val=obj[k]??'';if(t==='textarea')return `<div class="fld"><label>${l}${req?' *':''}</label><textarea id="cad_${k}">${esc(val)}</textarea></div>`;if(t==='boolean')return `<div class="fld"><label>${l}</label><select id="cad_${k}"><option value="true" ${val?'selected':''}>Sim</option><option value="false" ${!val?'selected':''}>Não</option></select></div>`;if(t.startsWith('select:')){const spec=t.slice(7);let options;if(DB[spec])options=opt(DB[spec],val,'Selecione');else options=opt(spec.split(',').map(x=>[x,x]),val,'Selecione');return `<div class="fld"><label>${l}${req?' *':''}</label><select id="cad_${k}">${options}</select></div>`}return `<div class="fld"><label>${l}${req?' *':''}</label><input id="cad_${k}" type="${t==='number'?'number':'text'}" value="${esc(val)}"></div>`}
function editCad(ent,id=''){const cfg=CAD[ent],obj=id?clone(get(ent,id)):{id:nid(ent.slice(0,3))};openBasicModal((id?'Editar ':'Novo ')+cfg.title,`<div class="row2">${cfg.fields.map(f=>inputField(ent,obj,f)).join('')}</div>`,`<button type="button" class="btn ghost" onclick="closeModal()">Cancelar</button><button type="button" class="btn teal" onclick="saveCad('${ent}','${id||obj.id}')">Salvar</button>`)}
function saveCad(ent,id){const cfg=CAD[ent];let obj=get(ent,id)||{id};for(const fld of cfg.fields){const [k,l,t,req]=fld;const el=document.getElementById('cad_'+k);let v=el?el.value:'';if(req&&!String(v).trim()){toast('Campo obrigatório: '+l);return}if(t==='number'){v=+v||0;if(v<0){toast('Número inválido: '+l);return}}if(t==='boolean')v=v==='true';obj[k]=typeof v==='string'?v.trim():v}if(!get(ent,id))DB[ent].push(obj);closeModal();render();toast('Registro salvo')}
function delCad(ent,id){const links={cliente:DB.venda.some(v=>v.clienteId===id),produtoServico:DB.venda.some(v=>v.itens.some(i=>i.produtoServicoId===id)),vendedor:DB.venda.some(v=>v.vendedorId===id)||DB.lead.some(l=>l.vendedorId===id),colaborador:DB.projeto.some(p=>p.profissionais.some(x=>x.colaboradorId===id))};if(links[ent]){toast('Não é possível excluir: há vínculos');return}confirmBox('Excluir este registro?',()=>{DB[ent]=DB[ent].filter(x=>x.id!==id);render();toast('Registro excluído')})}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('modal').classList.contains('on'))closeModal()});
document.getElementById('scrim').addEventListener('click',()=>{if(!W)closeModal()});
window.addEventListener('beforeunload',persistDB);
applySidebarState();
go('dashboard');
</script>
</body>
</html>
